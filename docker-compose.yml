# AccessFlow — zero-config demo stack
#
# `docker compose up -d` from a fresh clone brings up Postgres, Redis, the AccessFlow
# backend, and the frontend using the pre-built GHCR images. No `.env`, no key
# generation, no other setup needed. Open http://localhost:5173 and follow the
# on-screen setup wizard to create the first organization + admin user.
#
# ⚠️  DEMO ONLY — the JWT private key and encryption key below are committed in
#     plaintext for the zero-config experience. They are NOT safe for any
#     deployment that handles real data. For production, follow the
#     "Production-style configuration" path in docs/09-deployment.md: generate
#     your own secrets, mount them via a `.env` file or a real secret store,
#     and never reuse these embedded defaults.
#
# Developing AccessFlow from source? Use backend/docker-compose-dev.yml instead
# — it boots Postgres + Redis + Mailcrab without the application containers, so
# you can run `./mvnw spring-boot:run` and `npm run dev` against them.

services:
  postgres:
    image: postgres:18
    container_name: accessflow-postgres
    environment:
      POSTGRES_DB: accessflow
      POSTGRES_USER: accessflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-accessflow}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accessflow-network
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: accessflow-redis
    volumes:
      - redis_data:/data
    networks:
      - accessflow-network
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    image: ghcr.io/bablsoft/accessflow-backend:latest
    container_name: accessflow-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/accessflow
      DB_USER: accessflow
      DB_PASSWORD: ${DB_PASSWORD:-accessflow}
      REDIS_URL: redis://redis:6379
      # ⚠️  DEMO ONLY — do not reuse in production. Generate your own with:
      #     openssl rand -hex 32
