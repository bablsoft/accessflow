server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Single-page app: any unknown path falls back to index.html so React Router
    # can handle the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config is injected per-environment by replacing this one file
    # (Docker bind-mount or Kubernetes ConfigMap — see docs/09-deployment.md).
    # Disable caching so a redeploy of the same image picks up new URLs immediately.
    location = /runtime-config.js {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Cache the hashed JS / CSS bundle aggressively — Vite emits content-hashed
    # filenames so cache invalidation is automatic on a new release.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Never cache index.html itself — it references the hashed bundles.
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }
}
