<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{notification.email.anomaly_detected.title}">Behavioral anomaly detected</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2933; }
        pre { background: #f7fafc; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
        .meta { color: #4a5568; font-size: 13px; }
        .btn { display: inline-block; padding: 8px 16px; background: #c53030; color: #fff; text-decoration: none; border-radius: 4px; }
        .anomaly-banner { padding: 10px 12px; border-left: 3px solid #c53030; background: #fff5f5; color: #742a2a; }
    </style>
</head>
<body>
    <h2 th:text="#{notification.email.anomaly_detected.heading}">A behavioral anomaly was detected</h2>
    <p class="anomaly-banner" th:text="#{notification.email.anomaly_detected.body}">
        AccessFlow flagged out-of-pattern database activity relative to the user's baseline.
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.anomaly_detected.user_label}">User:</strong>
        <span th:text="${anomalyUserLabel} ?: '—'">—</span>
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.common.datasource_label}">Datasource:</strong>
        <span th:text="${datasourceName} ?: '—'">—</span>
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.anomaly_detected.feature_label}">Feature:</strong>
        <span th:text="${anomalyFeature} ?: '—'">—</span>
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.anomaly_detected.score_label}">Score:</strong>
        <span th:text="${anomalyScore} ?: '—'">—</span>
    </p>
    <p class="meta" th:if="${anomalyBaselineMean != null}">
        <strong th:text="#{notification.email.anomaly_detected.baseline_label}">Baseline mean:</strong>
        <span th:text="${anomalyBaselineMean}">—</span>
        <span th:if="${anomalyObservedValue != null}" th:text="'(observed ' + ${anomalyObservedValue} + ')'"></span>
    </p>
    <p th:if="${aiSummary}" th:text="${aiSummary}"></p>
    <p>
        <a class="btn" th:href="${reviewUrl}" th:text="#{notification.email.anomaly_detected.cta}">Open in AccessFlow</a>
    </p>
</body>
</html>
