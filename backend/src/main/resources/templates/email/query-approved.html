<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{notification.email.query_approved.title}">Query approved</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2933; }
        pre { background: #f7fafc; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
        .meta { color: #4a5568; font-size: 13px; }
        .btn { display: inline-block; padding: 8px 16px; background: #2f855a; color: #fff; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2 th:text="#{notification.email.query_approved.heading}">Your query was approved</h2>
    <p class="meta">
        <strong th:text="#{notification.email.common.datasource_label}">Datasource:</strong>
        <span th:text="${datasourceName} ?: '—'">—</span><br>
        <strong th:text="#{notification.email.query_approved.approved_by_label}">Approved by:</strong>
        <span th:text="${reviewerDisplayName} ?: #{notification.email.query_approved.auto_approved_fallback}">auto-approved</span>
    </p>
    <p><strong th:text="#{notification.email.common.sql_preview_label}">SQL preview:</strong></p>
    <pre th:text="${sqlPreview}"></pre>
    <p>
        <a class="btn" th:href="${reviewUrl}" th:text="#{notification.email.common.open_cta}">Open in AccessFlow</a>
    </p>
</body>
</html>
