<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{notification.email.break_glass_executed.title}">Break-glass query executed</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2933; }
        pre { background: #f7fafc; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
        .meta { color: #4a5568; font-size: 13px; }
        .btn { display: inline-block; padding: 8px 16px; background: #c53030; color: #fff; text-decoration: none; border-radius: 4px; }
        .break-glass-banner { padding: 10px 12px; border-left: 3px solid #c53030; background: #fff5f5; color: #742a2a; }
    </style>
</head>
<body>
    <h2 th:text="#{notification.email.break_glass_executed.heading}">A break-glass query was executed</h2>
    <p class="break-glass-banner" th:text="#{notification.email.break_glass_executed.body}">
        An emergency query bypassed pre-approval and executed immediately. It requires a mandatory
        retrospective review.
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.break_glass_executed.user_label}">Executed by:</strong>
        <span th:text="${submitterDisplayName} ?: (${submitterEmail} ?: '—')">—</span>
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.common.datasource_label}">Datasource:</strong>
        <span th:text="${datasourceName} ?: '—'">—</span>
    </p>
    <p class="meta" th:if="${sqlPreview}">
        <strong th:text="#{notification.email.break_glass_executed.query_label}">Query:</strong>
    </p>
    <pre th:if="${sqlPreview}" th:text="${sqlPreview}"></pre>
    <p>
        <a class="btn" th:href="${reviewUrl}" th:text="#{notification.email.break_glass_executed.cta}">Open in AccessFlow</a>
    </p>
</body>
</html>
