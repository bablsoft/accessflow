<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{notification.email.query_review_timeout.title}">Query auto-rejected (review timeout)</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2933; }
        pre { background: #f7fafc; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
        .meta { color: #4a5568; font-size: 13px; }
        .btn { display: inline-block; padding: 8px 16px; background: #c05621; color: #fff; text-decoration: none; border-radius: 4px; }
        .timeout-banner { padding: 10px 12px; border-left: 3px solid #c05621; background: #fffaf0; color: #744210; }
    </style>
</head>
<body>
    <h2 th:text="#{notification.email.query_review_timeout.heading}">Your query was automatically rejected</h2>
    <p class="timeout-banner" th:if="${approvalTimeoutHours}"
       th:text="#{notification.email.query_review_timeout.body(${approvalTimeoutHours})}">
        No reviewer responded within the configured timeout, so AccessFlow auto-rejected the request.
    </p>
    <p class="meta">
        <strong th:text="#{notification.email.common.datasource_label}">Datasource:</strong>
        <span th:text="${datasourceName} ?: '—'">—</span>
    </p>
    <p><strong th:text="#{notification.email.common.sql_preview_label}">SQL preview:</strong></p>
    <pre th:text="${sqlPreview}"></pre>
    <p>
        <a class="btn" th:href="${reviewUrl}" th:text="#{notification.email.query_review_timeout.cta}">Open in AccessFlow</a>
    </p>
</body>
</html>
