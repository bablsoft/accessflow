<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{notification.email.query_rejected.title}">Query rejected</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2933; }
        pre { background: #f7fafc; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
        .meta { color: #4a5568; font-size: 13px; }
        .btn { display: inline-block; padding: 8px 16px; background: #c53030; color: #fff; text-decoration: none; border-radius: 4px; }
        blockquote { margin: 0; padding: 8px 12px; border-left: 3px solid #c05621; background: #fffaf0; }
    </style>
</head>
<body>
    <h2 th:text="#{notification.email.query_rejected.heading}">Your query was rejected</h2>
    <p class="meta">
        <strong th:text="#{notification.email.common.datasource_label}">Datasource:</strong>
        <span th:text="${datasourceName} ?: '—'">—</span><br>
        <strong th:text="#{notification.email.query_rejected.rejected_by_label}">Rejected by:</strong>
        <span th:text="${reviewerDisplayName} ?: '—'">—</span>
    </p>
    <p th:if="${reviewerComment}">
        <strong th:text="#{notification.email.query_rejected.reviewer_comment_label}">Reviewer comment:</strong>
    </p>
    <blockquote th:if="${reviewerComment}" th:text="${reviewerComment}"></blockquote>
    <p><strong th:text="#{notification.email.common.sql_preview_label}">SQL preview:</strong></p>
    <pre th:text="${sqlPreview}"></pre>
    <p>
        <a class="btn" th:href="${reviewUrl}" th:text="#{notification.email.common.open_cta}">Open in AccessFlow</a>
    </p>
</body>
</html>
