spring:
  application:
    name: accessflow-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accessflow}
    username: ${DB_USER:accessflow}
    password: ${DB_PASSWORD:accessflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      # Admin-uploaded JDBC driver JARs are size-checked at the storage layer (50 MB max);
      # bump request/file limits slightly above that to leave room for the multipart envelope.
      max-file-size: 50MB
      max-request-size: 51MB

  # AI provider config is fully DB-driven (ai_config table) and applied at runtime by
  # AiAnalyzerStrategyHolder. Disable every Spring AI startup model auto-config so the
  # context does not try to build a ChatModel / embedding / image / audio bean from
  # absent env-var properties.
  ai:
    model:
      chat: none
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    mcp:
      server:
        name: accessflow-mcp
        version: 1.0.0
        # Stateless transport — every request carries auth, no client session is held server-side.
        # See https://docs.spring.io/spring-ai/reference/api/mcp/mcp-stateless-server-boot-starter-docs.html
        protocol: STATELESS
        instructions: >
          AccessFlow MCP server. Use list_datasources to discover databases you can query,
          submit_query to enqueue a SQL query for review, get_query_status to monitor it,
          and get_query_result once it is EXECUTED. Reviewers can additionally call
          list_pending_reviews and review_query.

server:
  port: ${SERVER_PORT:8080}

management:
  tracing:
    sampling:
      probability: ${ACCESSFLOW_TRACING_SAMPLING_PROBABILITY:1.0}
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

accessflow:
  encryption-key: ${ENCRYPTION_KEY:}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    access-token-expiry: ${ACCESSFLOW_JWT_ACCESS_TOKEN_EXPIRY:PT15M}
    refresh-token-expiry: ${ACCESSFLOW_JWT_REFRESH_TOKEN_EXPIRY:P7D}
  security:
    invitation:
      # TTL of user-invitation tokens. Pending invitations past this duration are treated as
      # expired on lookup and cannot be accepted (admins can resend to issue a fresh token).
      ttl: ${ACCESSFLOW_SECURITY_INVITATION_TTL:P7D}
      # Base URL used to build the accept-invite link embedded in the email. Defaults to the
      # frontend origin (same default as ACCESSFLOW_PUBLIC_BASE_URL).
      accept-base-url: ${ACCESSFLOW_PUBLIC_BASE_URL:http://localhost:5173}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  proxy:
    connection-timeout: ${ACCESSFLOW_PROXY_CONNECTION_TIMEOUT:30s}
    idle-timeout: ${ACCESSFLOW_PROXY_IDLE_TIMEOUT:10m}
    max-lifetime: ${ACCESSFLOW_PROXY_MAX_LIFETIME:30m}
    leak-detection-threshold: ${ACCESSFLOW_PROXY_LEAK_DETECTION_THRESHOLD:0s}
    pool-name-prefix: accessflow-ds-
    execution:
      max-rows: ${ACCESSFLOW_PROXY_EXECUTION_MAX_ROWS:10000}
      statement-timeout: ${ACCESSFLOW_PROXY_EXECUTION_STATEMENT_TIMEOUT:30s}
      default-fetch-size: ${ACCESSFLOW_PROXY_EXECUTION_DEFAULT_FETCH_SIZE:1000}
  drivers:
    cache-dir: ${ACCESSFLOW_DRIVER_CACHE:${user.home}/.accessflow/drivers}
    repository-url: ${ACCESSFLOW_DRIVERS_REPOSITORY_URL:https://repo1.maven.org/maven2}
    offline: ${ACCESSFLOW_DRIVERS_OFFLINE:false}
  notifications:
    public-base-url: ${ACCESSFLOW_PUBLIC_BASE_URL:http://localhost:5173}
    retry:
      first: ${ACCESSFLOW_NOTIFICATIONS_RETRY_FIRST:PT30S}
      second: ${ACCESSFLOW_NOTIFICATIONS_RETRY_SECOND:PT2M}
      third: ${ACCESSFLOW_NOTIFICATIONS_RETRY_THIRD:PT10M}
  workflow:
    # Cadence at which QueryTimeoutJob scans for PENDING_REVIEW queries past their plan's
    # approval_timeout_hours. ShedLock makes this safe under horizontal scaling.
    timeout-poll-interval: ${ACCESSFLOW_WORKFLOW_TIMEOUT_POLL_INTERVAL:PT5M}
  audit:
    # HMAC-SHA256 key (hex-encoded, >= 32 bytes) used to chain audit_log rows. Optional: when unset
    # we fall back to an HKDF-SHA256 derivative of accessflow.encryption-key. See AuditConfiguration.
    hmac-key: ${AUDIT_HMAC_KEY:}
  oauth2:
    # Where the OAuth2 success/failure handler redirects after the provider roundtrip completes.
    # The frontend parses ?code= or ?error= from the query string and posts to /auth/oauth2/exchange.
    frontend-callback-url: ${ACCESSFLOW_OAUTH2_FRONTEND_CALLBACK_URL:${accessflow.cors.allowed-origin}/auth/oauth/callback}
    # One-time exchange code lifetime in Redis. Keep short — codes are single-use anyway.
    exchange-code-ttl: ${ACCESSFLOW_OAUTH2_EXCHANGE_CODE_TTL:PT1M}
  saml:
    # Where the SAML success / failure handler redirects after the IdP roundtrip completes.
    # The frontend parses ?code= or ?error= from the query string and posts to /auth/saml/exchange.
    frontend-callback-url: ${ACCESSFLOW_SAML_FRONTEND_CALLBACK_URL:${accessflow.cors.allowed-origin}/auth/saml/callback}
    # One-time exchange code lifetime in Redis. Keep short — codes are single-use anyway.
    exchange-code-ttl: ${ACCESSFLOW_SAML_EXCHANGE_CODE_TTL:PT1M}
    sp:
      # Optional. When both env vars are set, this PEM-encoded RSA private key + X.509 cert pair is
      # used to sign AuthnRequest messages and ship in the SP metadata XML. When unset, AccessFlow
      # auto-generates a self-signed RSA-2048 keypair on first SAML flow and persists it (encrypted)
      # in the saml_config row so it survives restarts.
      signing-key-pem: ${ACCESSFLOW_SAML_SP_SIGNING_KEY_PEM:}
      signing-cert-pem: ${ACCESSFLOW_SAML_SP_SIGNING_CERT_PEM:}
  # Env-driven startup bootstrap of admin config (org, admin user, review plans, AI configs,
  # datasources, SAML, OAuth2, notification channels, system SMTP). Disabled by default so the
  # setup wizard remains the path for non-K8s installs. See docs/09-deployment.md →
  # "Bootstrap configuration" for the property tree and Helm wiring.
  bootstrap:
    enabled: ${ACCESSFLOW_BOOTSTRAP_ENABLED:false}

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    enabled: false
