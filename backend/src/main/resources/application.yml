spring:
  application:
    name: accessflow-app

  main:
    banner-mode: "off"

  autoconfigure:
    # RAG vector stores (pgvector / Qdrant) are built per ai_config row at runtime by
    # SpringAiVectorStoreFactory — never as context beans. Exclude their starters' auto-configs
    # so the context does not try to build a VectorStore from absent connection properties.
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accessflow}
    username: ${DB_USER:accessflow}
    password: ${DB_PASSWORD:accessflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      # Postgres role names used by V38__audit_log_role_separation.sql. Override only
      # when the deployment uses a non-default role name (e.g. operator-managed
      # ${DB_USER}/${AUDIT_DB_USER} env vars wire these to the right values).
      app_role: ${DB_USER:accessflow}
      audit_role: ${AUDIT_DB_USER:accessflow_audit}
      # Embedding dimension of the in-app RAG pgvector column (V69). Must match the
      # embedding model's output dimension; set before the first migrate (it fixes the
      # vector(N) column type). Mirrors accessflow.rag.pgvector-dimensions below.
      rag_pgvector_dimensions: ${ACCESSFLOW_RAG_PGVECTOR_DIMENSIONS:1536}

  threads:
    virtual:
      enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      # Admin-uploaded JDBC driver JARs are size-checked at the storage layer (50 MB max);
      # bump request/file limits slightly above that to leave room for the multipart envelope.
      max-file-size: 50MB
      max-request-size: 51MB

  # AI provider config is fully DB-driven (ai_config table) and applied at runtime by
  # AiAnalyzerStrategyHolder. Disable every Spring AI startup model auto-config so the
  # context does not try to build a ChatModel / embedding / image / audio bean from
  # absent env-var properties.
  ai:
    model:
      chat: none
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    mcp:
      server:
        name: accessflow-mcp
        version: 1.0.0
        # Stateless transport — every request carries auth, no client session is held server-side.
        # See https://docs.spring.io/spring-ai/reference/api/mcp/mcp-stateless-server-boot-starter-docs.html
        protocol: STATELESS
        instructions: >
          AccessFlow MCP server. Use list_datasources to discover databases you can query,
          submit_query to enqueue a SQL query for review, get_query_status to monitor it,
          and get_query_result once it is EXECUTED. Reviewers can additionally call
          list_pending_reviews and review_query.

server:
  port: ${SERVER_PORT:8080}

management:
  tracing:
    sampling:
      probability: ${ACCESSFLOW_TRACING_SAMPLING_PROBABILITY:1.0}
  # OTLP trace export is OFF unless an endpoint is supplied (AF-454). Setting
  # OTEL_EXPORTER_OTLP_ENDPOINT (the full OTLP/HTTP traces URL, e.g.
  # http://tempo:4318/v1/traces) makes OtlpTracingEnvironmentPostProcessor bind
  # management.opentelemetry.tracing.export.otlp.endpoint, which wires the Spring Boot
  # OtlpHttpSpanExporter. MDC traceId/spanId are populated regardless of export.
  endpoints:
    web:
      # health,info are consumed unauthenticated by k8s probes / the version footer;
      # prometheus is scraped in-cluster (permitAll in SecurityConfiguration) to back the
      # pre-built Grafana dashboards (AF-454). Restrict it with a NetworkPolicy in production.
      exposure:
        include: health,info,prometheus

logging:
  structured:
    format:
      console: ${ACCESSFLOW_LOGGING_STRUCTURED_FORMAT:}
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

accessflow:
  encryption-key: ${ENCRYPTION_KEY:}
  secrets:
    # External secret stores (AF-448). A datasource credential may be stored as a secret
    # reference (vault:<mount>/<path>#<field> / aws:<name-or-arn>[#jsonField] /
    # azure:<secret-name>) resolved through the enabled provider at credential-use time instead
    # of local AES-256-GCM ciphertext. Each provider is opt-in; when disabled its reference
    # prefix is rejected at datasource write time. Full setup guide: docs/09-deployment.md.
    vault:
      enabled: ${ACCESSFLOW_SECRETS_VAULT_ENABLED:false}
      uri: ${ACCESSFLOW_SECRETS_VAULT_URI:}
      # TOKEN (default), APPROLE or KUBERNETES.
      auth-method: ${ACCESSFLOW_SECRETS_VAULT_AUTH_METHOD:TOKEN}
      token: ${ACCESSFLOW_SECRETS_VAULT_TOKEN:}
      app-role-id: ${ACCESSFLOW_SECRETS_VAULT_APP_ROLE_ID:}
      app-role-secret-id: ${ACCESSFLOW_SECRETS_VAULT_APP_ROLE_SECRET_ID:}
      kubernetes-role: ${ACCESSFLOW_SECRETS_VAULT_KUBERNETES_ROLE:}
      kubernetes-auth-path: ${ACCESSFLOW_SECRETS_VAULT_KUBERNETES_AUTH_PATH:kubernetes}
      # KV secrets-engine version used to build read paths (2 inserts /data/ after the mount).
      kv-version: ${ACCESSFLOW_SECRETS_VAULT_KV_VERSION:2}
      # Vault Enterprise namespace (X-Vault-Namespace header); leave empty for OSS Vault.
      namespace: ${ACCESSFLOW_SECRETS_VAULT_NAMESPACE:}
    aws:
      enabled: ${ACCESSFLOW_SECRETS_AWS_ENABLED:false}
      # When unset, the SDK default region/credentials chain applies (env vars, IRSA, instance
      # profile). endpoint-override targets LocalStack or a VPC endpoint.
      region: ${ACCESSFLOW_SECRETS_AWS_REGION:}
      endpoint-override: ${ACCESSFLOW_SECRETS_AWS_ENDPOINT_OVERRIDE:}
      access-key-id: ${ACCESSFLOW_SECRETS_AWS_ACCESS_KEY_ID:}
      secret-access-key: ${ACCESSFLOW_SECRETS_AWS_SECRET_ACCESS_KEY:}
    azure:
      enabled: ${ACCESSFLOW_SECRETS_AZURE_ENABLED:false}
      vault-url: ${ACCESSFLOW_SECRETS_AZURE_VAULT_URL:}
      # When tenant/client id + secret are set a client-secret credential is used; otherwise
      # DefaultAzureCredential (workload identity, managed identity, env vars).
      tenant-id: ${ACCESSFLOW_SECRETS_AZURE_TENANT_ID:}
      client-id: ${ACCESSFLOW_SECRETS_AZURE_CLIENT_ID:}
      client-secret: ${ACCESSFLOW_SECRETS_AZURE_CLIENT_SECRET:}
  rag:
    pgvector:
      # When false, the deployment opts out of the in-app pgvector store entirely: no extension
      # provisioning is attempted, the vector_store migration (V69) is skipped, and PGVECTOR RAG is
      # disabled. External Qdrant RAG is unaffected. The app always starts regardless of this flag.
      enabled: ${ACCESSFLOW_RAG_PGVECTOR_ENABLED:true}
      # Best-effort 'CREATE EXTENSION IF NOT EXISTS vector' before migrating, so a DB role that may
      # create extensions needs no separate superuser init step. Set false to leave provisioning to
      # the operator (an already-installed extension is still detected and used).
      auto-provision: ${ACCESSFLOW_RAG_PGVECTOR_AUTO_PROVISION:true}
    # In-app pgvector embedding dimension; must match the vector(N) column (Flyway placeholder
    # rag_pgvector_dimensions above) and the embedding model's output dimension.
    pgvector-dimensions: ${ACCESSFLOW_RAG_PGVECTOR_DIMENSIONS:1536}
    # Token chunk size used when splitting a knowledge document for embedding.
    chunk-size: ${ACCESSFLOW_RAG_CHUNK_SIZE:800}
    # Maximum character length of a single knowledge document accepted for ingestion.
    max-document-chars: ${ACCESSFLOW_RAG_MAX_DOCUMENT_CHARS:100000}
  ai:
    rate-limit:
      # Per-organization AI guardrails (AF-55), enforced before every AiAnalyzerStrategy call so a
      # runaway editor or compromised account cannot drain the provider API key / monthly budget.
      # requests-per-minute: Redis fixed-window per-org request cap (<=0 disables).
      requests-per-minute: ${ACCESSFLOW_AI_RATE_LIMIT_REQUESTS_PER_MINUTE:30}
      # tokens-per-month: per-org monthly budget over summed ai_analyses prompt+completion tokens
      # in the current calendar month; 0 = unlimited / opt-in (<=0 disables).
      tokens-per-month: ${ACCESSFLOW_AI_RATE_LIMIT_TOKENS_PER_MONTH:0}
    anomaly:
      # Behavioural anomaly detection (UBA, AF-383). The job runs every detection-poll-interval over
      # the most recent completed lookback-window of audit metadata; deviations beyond the z-score /
      # IQR thresholds (once the baseline has min-sample-size windows) are persisted as anomalies.
      detection-poll-interval: ${ACCESSFLOW_AI_ANOMALY_DETECTION_POLL_INTERVAL:PT15M}
      lookback-window: ${ACCESSFLOW_AI_ANOMALY_LOOKBACK_WINDOW:PT1H}
      z-score-threshold: ${ACCESSFLOW_AI_ANOMALY_Z_SCORE_THRESHOLD:3.0}
      iqr-multiplier: ${ACCESSFLOW_AI_ANOMALY_IQR_MULTIPLIER:1.5}
      min-sample-size: ${ACCESSFLOW_AI_ANOMALY_MIN_SAMPLE_SIZE:7}
      max-baseline-samples: ${ACCESSFLOW_AI_ANOMALY_MAX_BASELINE_SAMPLES:90}
      off-hours-threshold: ${ACCESSFLOW_AI_ANOMALY_OFF_HOURS_THRESHOLD:0.02}
      summary-enabled: ${ACCESSFLOW_AI_ANOMALY_SUMMARY_ENABLED:true}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    access-token-expiry: ${ACCESSFLOW_JWT_ACCESS_TOKEN_EXPIRY:PT15M}
    refresh-token-expiry: ${ACCESSFLOW_JWT_REFRESH_TOKEN_EXPIRY:P7D}
  security:
    invitation:
      # TTL of user-invitation tokens. Pending invitations past this duration are treated as
      # expired on lookup and cannot be accepted (admins can resend to issue a fresh token).
      ttl: ${ACCESSFLOW_SECURITY_INVITATION_TTL:P7D}
      # Base URL used to build the accept-invite link embedded in the email. Defaults to the
      # frontend origin (same default as ACCESSFLOW_PUBLIC_BASE_URL).
      accept-base-url: ${ACCESSFLOW_PUBLIC_BASE_URL:http://localhost:5173}
    step-up:
      # TTL of the single-use step-up token minted by POST /auth/step-up and consumed by the
      # one-tap push decision endpoint (AF-444). Keep short.
      ttl: ${ACCESSFLOW_SECURITY_STEP_UP_TTL:PT5M}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  proxy:
    connection-timeout: ${ACCESSFLOW_PROXY_CONNECTION_TIMEOUT:30s}
    idle-timeout: ${ACCESSFLOW_PROXY_IDLE_TIMEOUT:10m}
    max-lifetime: ${ACCESSFLOW_PROXY_MAX_LIFETIME:30m}
    leak-detection-threshold: ${ACCESSFLOW_PROXY_LEAK_DETECTION_THRESHOLD:0s}
    pool-name-prefix: accessflow-ds-
    execution:
      max-rows: ${ACCESSFLOW_PROXY_EXECUTION_MAX_ROWS:10000}
      statement-timeout: ${ACCESSFLOW_PROXY_EXECUTION_STATEMENT_TIMEOUT:30s}
      default-fetch-size: ${ACCESSFLOW_PROXY_EXECUTION_DEFAULT_FETCH_SIZE:1000}
      insert-batch-chunk-size: ${ACCESSFLOW_PROXY_EXECUTION_INSERT_BATCH_CHUNK_SIZE:1000}
      max-result-bytes: ${ACCESSFLOW_PROXY_EXECUTION_MAX_RESULT_BYTES:52428800}
      max-concurrent: ${ACCESSFLOW_PROXY_EXECUTION_MAX_CONCURRENT:32}
      acquire-timeout: ${ACCESSFLOW_PROXY_EXECUTION_ACQUIRE_TIMEOUT:5s}
    # Opt-in SELECT result cache (AF-457). `enabled` is the deployment-wide kill-switch; the real
    # gate is each datasource's result_cache_enabled flag. default-ttl applies when a datasource
    # opts in without its own TTL; entries above max-entry-bytes are never cached.
    cache:
      enabled: ${ACCESSFLOW_PROXY_CACHE_ENABLED:true}
      default-ttl: ${ACCESSFLOW_PROXY_CACHE_DEFAULT_TTL:PT60S}
      max-entry-bytes: ${ACCESSFLOW_PROXY_CACHE_MAX_ENTRY_BYTES:1000000}
    # Read-replica health checks (AF-457): per-node prober cadence, per-endpoint isValid timeout,
    # and how long a failed endpoint sits out of the read rotation before a half-open retry.
    replica:
      probe-interval: ${ACCESSFLOW_PROXY_REPLICA_PROBE_INTERVAL:PT30S}
      probe-timeout: ${ACCESSFLOW_PROXY_REPLICA_PROBE_TIMEOUT:PT5S}
      cooldown: ${ACCESSFLOW_PROXY_REPLICA_COOLDOWN:PT30S}
    # Per-engine plugin tuning, passed verbatim (after key normalization) into the engine's
    # QueryEngineContext config map. Generic env form: ACCESSFLOW_PROXY_ENGINES_<ID>_<KEY>.
    # The ACCESSFLOW_PROXY_MONGO_* names are legacy aliases kept working via these placeholders.
    engines:
      mongodb:
        connect-timeout: ${ACCESSFLOW_PROXY_MONGO_CONNECT_TIMEOUT:PT10S}
        server-selection-timeout: ${ACCESSFLOW_PROXY_MONGO_SERVER_SELECTION_TIMEOUT:PT10S}
        max-pool-size: ${ACCESSFLOW_PROXY_MONGO_MAX_POOL_SIZE:10}
      redis:
        connect-timeout: ${ACCESSFLOW_PROXY_ENGINES_REDIS_CONNECT_TIMEOUT:PT5S}
        socket-timeout: ${ACCESSFLOW_PROXY_ENGINES_REDIS_SOCKET_TIMEOUT:PT5S}
        max-pool-size: ${ACCESSFLOW_PROXY_ENGINES_REDIS_MAX_POOL_SIZE:10}
      cassandra:
        connect-timeout: ${ACCESSFLOW_PROXY_ENGINES_CASSANDRA_CONNECT_TIMEOUT:PT10S}
        request-timeout: ${ACCESSFLOW_PROXY_ENGINES_CASSANDRA_REQUEST_TIMEOUT:PT10S}
      scylladb:
        connect-timeout: ${ACCESSFLOW_PROXY_ENGINES_SCYLLADB_CONNECT_TIMEOUT:PT10S}
        request-timeout: ${ACCESSFLOW_PROXY_ENGINES_SCYLLADB_REQUEST_TIMEOUT:PT10S}
      elasticsearch:
        connect-timeout: ${ACCESSFLOW_PROXY_ENGINES_ELASTICSEARCH_CONNECT_TIMEOUT:PT10S}
        socket-timeout: ${ACCESSFLOW_PROXY_ENGINES_ELASTICSEARCH_SOCKET_TIMEOUT:PT30S}
      opensearch:
        connect-timeout: ${ACCESSFLOW_PROXY_ENGINES_OPENSEARCH_CONNECT_TIMEOUT:PT10S}
        socket-timeout: ${ACCESSFLOW_PROXY_ENGINES_OPENSEARCH_SOCKET_TIMEOUT:PT30S}
      neo4j:
        connect-timeout: ${ACCESSFLOW_PROXY_ENGINES_NEO4J_CONNECT_TIMEOUT:PT10S}
        max-connection-pool-size: ${ACCESSFLOW_PROXY_ENGINES_NEO4J_MAX_CONNECTION_POOL_SIZE:100}
  drivers:
    cache-dir: ${ACCESSFLOW_DRIVER_CACHE:${user.home}/.accessflow/drivers}
    repository-url: ${ACCESSFLOW_DRIVERS_REPOSITORY_URL:https://repo1.maven.org/maven2}
    offline: ${ACCESSFLOW_DRIVERS_OFFLINE:false}
  notifications:
    public-base-url: ${ACCESSFLOW_PUBLIC_BASE_URL:http://localhost:5173}
    retry:
      first: ${ACCESSFLOW_NOTIFICATIONS_RETRY_FIRST:PT30S}
      second: ${ACCESSFLOW_NOTIFICATIONS_RETRY_SECOND:PT2M}
      third: ${ACCESSFLOW_NOTIFICATIONS_RETRY_THIRD:PT10M}
    slack:
      # TTL of the one-time Slack account-link code generated for `/accessflow link <code>`.
      link-code-ttl: ${ACCESSFLOW_NOTIFICATIONS_SLACK_LINK_CODE_TTL:PT10M}
      # Acceptance window for the X-Slack-Request-Timestamp HMAC signature; also the replay-dedup
      # window. Stale or replayed inbound Slack callbacks outside this window are rejected.
      signature-tolerance: ${ACCESSFLOW_NOTIFICATIONS_SLACK_SIGNATURE_TOLERANCE:PT5M}
    # PagerDuty Events API v2 base URL used by PAGERDUTY notification channels. Override for
    # air-gapped installs that route through an internal proxy.
    pagerduty-api-base-url: ${ACCESSFLOW_NOTIFICATIONS_PAGERDUTY_API_BASE_URL:https://events.pagerduty.com/}
  push:
    # Web Push (VAPID) keypair (AF-444). When both keys are set (raw base64url, e.g. from
    # `web-push generate-vapid-keys`) they take precedence; otherwise a keypair is auto-generated
    # on first use and persisted (private key encrypted with ENCRYPTION_KEY) in push_vapid_config.
    vapid:
      public-key: ${ACCESSFLOW_PUSH_VAPID_PUBLIC_KEY:}
      private-key: ${ACCESSFLOW_PUSH_VAPID_PRIVATE_KEY:}
      # VAPID `sub` claim — a mailto: or https: contact URL identifying this application server.
      subject: ${ACCESSFLOW_PUSH_VAPID_SUBJECT:mailto:accessflow@localhost}
  workflow:
    # Cadence at which QueryTimeoutJob scans for PENDING_REVIEW queries past their plan's
    # approval_timeout_hours. ShedLock makes this safe under horizontal scaling.
    timeout-poll-interval: ${ACCESSFLOW_WORKFLOW_TIMEOUT_POLL_INTERVAL:PT5M}
    # Cadence at which ScheduledQueryRunJob scans for APPROVED queries whose scheduled_for
    # timestamp has been reached. ShedLock makes this safe under horizontal scaling.
    scheduled-run-poll-interval: ${ACCESSFLOW_WORKFLOW_SCHEDULED_RUN_POLL_INTERVAL:PT1M}
  dashboard:
    weekly-digest:
      # Cadence at which WeeklyDigestJob wakes to scan for opted-in users due a digest (AF-498).
      # ShedLock makes this safe under horizontal scaling.
      poll-interval: ${ACCESSFLOW_DASHBOARD_WEEKLY_DIGEST_POLL_INTERVAL:P1D}
      # Minimum gap between digests for a given user — the job sends at most once per period,
      # regardless of poll cadence or restarts.
      period: ${ACCESSFLOW_DASHBOARD_WEEKLY_DIGEST_PERIOD:P7D}
  access:
    # Cadence at which AccessGrantExpiryJob scans for APPROVED access grants past their
    # expires_at and revokes them. ShedLock makes this safe under horizontal scaling.
    grant-expiry-poll-interval: ${ACCESSFLOW_ACCESS_GRANT_EXPIRY_POLL_INTERVAL:PT5M}
    # Inclusive bounds the requested JIT access duration (ISO-8601) must fall within.
    min-duration: ${ACCESSFLOW_ACCESS_MIN_DURATION:PT15M}
    max-duration: ${ACCESSFLOW_ACCESS_MAX_DURATION:P30D}
  audit:
    # HMAC-SHA256 key (hex-encoded, >= 32 bytes) used to chain audit_log rows. Optional: when unset
    # we fall back to an HKDF-SHA256 derivative of accessflow.encryption-key. See AuditConfiguration.
    hmac-key: ${AUDIT_HMAC_KEY:}
    # Separate Postgres role used solely to INSERT into audit_log (issue #67). The role must
    # own audit_log so that REVOKE on the general DB_USER bites; provisioning lives in the
    # deployment manifests (deploy/postgres-init/01-audit-role.sql for compose, the Helm
    # chart's postgresql.primary.initdb.scripts for k8s). The URL is reused from
    # spring.datasource.url so the audit datasource hits the same Postgres instance.
    datasource:
      username: ${AUDIT_DB_USER:accessflow_audit}
      password: ${AUDIT_DB_PASSWORD:accessflow_audit}
  apigov:
    # Outbound OAuth2 token sourcing for API connectors (#506). Per-connector token endpoint,
    # credentials, scopes, grant type and client-auth live on the api_connectors row; these are the
    # deployment-wide knobs: a safety skew subtracted from the token's expires_in before caching, a
    # fallback TTL used when the token response omits expires_in, the token-endpoint HTTP timeout, and
    # the consecutive-failure count at which a connector-down alert fires to org admins.
    oauth2-token-cache-skew: ${ACCESSFLOW_APIGOV_OAUTH2_TOKEN_CACHE_SKEW:PT30S}
    oauth2-token-request-timeout: ${ACCESSFLOW_APIGOV_OAUTH2_TOKEN_REQUEST_TIMEOUT:PT10S}
    oauth2-token-fallback-ttl: ${ACCESSFLOW_APIGOV_OAUTH2_TOKEN_FALLBACK_TTL:PT60S}
    oauth2-token-failure-alert-threshold: ${ACCESSFLOW_APIGOV_OAUTH2_TOKEN_FAILURE_ALERT_THRESHOLD:3}
    # Caps the total encoded size of a submitted API request body (raw text, x-www-form-urlencoded,
    # or the base64-decoded size of form-data / binary file parts). Files ride inline as bounded
    # base64 since AccessFlow has no object storage. Exceeding it rejects the submission with 422.
    max-request-body-bytes: ${ACCESSFLOW_APIGOV_MAX_REQUEST_BODY_BYTES:5242880}
    # System-wide hard ceiling on a stored (and therefore downloadable) API response body — the
    # absolute backstop above any per-connector max_response_bytes. The body lives in a Postgres TEXT
    # column and is read fully into JVM memory during the call. response-preview-bytes is how much of
    # the stored snapshot is embedded inline in the detail view; the full body is served by the
    # download endpoint (GET /api-requests/{id}/response).
    max-response-bytes: ${ACCESSFLOW_APIGOV_MAX_RESPONSE_BYTES:10485760}
    response-preview-bytes: ${ACCESSFLOW_APIGOV_RESPONSE_PREVIEW_BYTES:65536}
  oauth2:
    # Where the OAuth2 success/failure handler redirects after the provider roundtrip completes.
    # The frontend parses ?code= or ?error= from the query string and posts to /auth/oauth2/exchange.
    frontend-callback-url: ${ACCESSFLOW_OAUTH2_FRONTEND_CALLBACK_URL:${accessflow.cors.allowed-origin}/auth/oauth/callback}
    # One-time exchange code lifetime in Redis. Keep short — codes are single-use anyway.
    exchange-code-ttl: ${ACCESSFLOW_OAUTH2_EXCHANGE_CODE_TTL:PT1M}
  saml:
    # Where the SAML success / failure handler redirects after the IdP roundtrip completes.
    # The frontend parses ?code= or ?error= from the query string and posts to /auth/saml/exchange.
    frontend-callback-url: ${ACCESSFLOW_SAML_FRONTEND_CALLBACK_URL:${accessflow.cors.allowed-origin}/auth/saml/callback}
    # One-time exchange code lifetime in Redis. Keep short — codes are single-use anyway.
    exchange-code-ttl: ${ACCESSFLOW_SAML_EXCHANGE_CODE_TTL:PT1M}
    sp:
      # Optional. When both env vars are set, this PEM-encoded RSA private key + X.509 cert pair is
      # used to sign AuthnRequest messages and ship in the SP metadata XML. When unset, AccessFlow
      # auto-generates a self-signed RSA-2048 keypair on first SAML flow and persists it (encrypted)
      # in the saml_config row so it survives restarts.
      signing-key-pem: ${ACCESSFLOW_SAML_SP_SIGNING_KEY_PEM:}
      signing-cert-pem: ${ACCESSFLOW_SAML_SP_SIGNING_CERT_PEM:}
  langfuse:
    # Default Langfuse host pre-filled when a per-org langfuse_config omits its own host. Per-org
    # credentials and toggles live in the langfuse_config table, not here.
    default-host: ${ACCESSFLOW_LANGFUSE_DEFAULT_HOST:https://cloud.langfuse.com}
    # How long a Langfuse-managed prompt is cached before it is re-fetched (edits in Langfuse take
    # effect within this window without a restart).
    prompt-cache-ttl: ${ACCESSFLOW_LANGFUSE_PROMPT_CACHE_TTL:PT60S}
    # Outbound HTTP timeouts for the Langfuse ingestion / prompt API.
    connect-timeout: ${ACCESSFLOW_LANGFUSE_CONNECT_TIMEOUT:PT5S}
    request-timeout: ${ACCESSFLOW_LANGFUSE_REQUEST_TIMEOUT:PT10S}
  # Env-driven startup bootstrap of admin config (org, admin user, review plans, AI configs,
  # datasources, SAML, OAuth2, notification channels, system SMTP). Disabled by default so the
  # setup wizard remains the path for non-K8s installs. See docs/09-deployment.md →
  # "Bootstrap configuration" for the property tree and Helm wiring.
  bootstrap:
    enabled: ${ACCESSFLOW_BOOTSTRAP_ENABLED:false}

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    enabled: false
