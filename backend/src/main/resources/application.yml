spring:
  application:
    name: accessflow-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accessflow}
    username: ${DB_USER:accessflow}
    password: ${DB_PASSWORD:accessflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

server:
  port: 8080

accessflow:
  edition: ${ACCESSFLOW_EDITION:community}
  encryption-key: ${ENCRYPTION_KEY:}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    access-token-expiry: PT15M
    refresh-token-expiry: P7D
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  proxy:
    connection-timeout: 30s
    idle-timeout: 10m
    max-lifetime: 30m
    leak-detection-threshold: 0s
    pool-name-prefix: accessflow-ds-
    execution:
      max-rows: 10000
      statement-timeout: 30s
      default-fetch-size: 1000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
