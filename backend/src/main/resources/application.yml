spring:
  application:
    name: accessflow-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accessflow}
    username: ${DB_USER:accessflow}
    password: ${DB_PASSWORD:accessflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      # Admin-uploaded JDBC driver JARs are size-checked at the storage layer (50 MB max);
      # bump request/file limits slightly above that to leave room for the multipart envelope.
      max-file-size: 50MB
      max-request-size: 51MB

  # AI provider config is fully DB-driven (ai_config table) and applied at runtime by
  # AiAnalyzerStrategyHolder. Disable every Spring AI startup model auto-config so the
  # context does not try to build a ChatModel / embedding / image / audio bean from
  # absent env-var properties.
  ai:
    model:
      chat: none
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none

server:
  port: 8080

management:
  tracing:
    sampling:
      probability: ${ACCESSFLOW_TRACING_SAMPLING_PROBABILITY:1.0}
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

accessflow:
  encryption-key: ${ENCRYPTION_KEY:}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    access-token-expiry: PT15M
    refresh-token-expiry: P7D
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  proxy:
    connection-timeout: 30s
    idle-timeout: 10m
    max-lifetime: 30m
    leak-detection-threshold: 0s
    pool-name-prefix: accessflow-ds-
    execution:
      max-rows: 10000
      statement-timeout: 30s
      default-fetch-size: 1000
  drivers:
    cache-dir: ${ACCESSFLOW_DRIVER_CACHE:${user.home}/.accessflow/drivers}
    repository-url: ${ACCESSFLOW_DRIVERS_REPOSITORY_URL:https://repo1.maven.org/maven2}
    offline: ${ACCESSFLOW_DRIVERS_OFFLINE:false}
  notifications:
    public-base-url: ${ACCESSFLOW_PUBLIC_BASE_URL:http://localhost:5173}
    retry:
      first: PT30S
      second: PT2M
      third: PT10M
  workflow:
    # Cadence at which QueryTimeoutJob scans for PENDING_REVIEW queries past their plan's
    # approval_timeout_hours. ShedLock makes this safe under horizontal scaling.
    timeout-poll-interval: ${ACCESSFLOW_WORKFLOW_TIMEOUT_POLL_INTERVAL:PT5M}
  audit:
    # HMAC-SHA256 key (hex-encoded, >= 32 bytes) used to chain audit_log rows. Optional: when unset
    # we fall back to an HKDF-SHA256 derivative of accessflow.encryption-key. See AuditConfiguration.
    hmac-key: ${AUDIT_HMAC_KEY:}
  oauth2:
    # Where the OAuth2 success/failure handler redirects after the provider roundtrip completes.
    # The frontend parses ?code= or ?error= from the query string and posts to /auth/oauth2/exchange.
    frontend-callback-url: ${ACCESSFLOW_OAUTH2_FRONTEND_CALLBACK_URL:${accessflow.cors.allowed-origin}/auth/oauth/callback}
    # One-time exchange code lifetime in Redis. Keep short — codes are single-use anyway.
    exchange-code-ttl: ${ACCESSFLOW_OAUTH2_EXCHANGE_CODE_TTL:PT1M}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
