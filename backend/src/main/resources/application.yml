spring:
  application:
    name: accessflow-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/accessflow}
    username: ${DB_USER:accessflow}
    password: ${DB_PASSWORD:accessflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  ai:
    anthropic:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.anthropic.com}
      chat:
        options:
          model: ${AI_MODEL:claude-sonnet-4-6}
          max-tokens: 1024

server:
  port: 8080

accessflow:
  edition: ${ACCESSFLOW_EDITION:community}
  encryption-key: ${ENCRYPTION_KEY:}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    access-token-expiry: PT15M
    refresh-token-expiry: P7D
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  proxy:
    connection-timeout: 30s
    idle-timeout: 10m
    max-lifetime: 30m
    leak-detection-threshold: 0s
    pool-name-prefix: accessflow-ds-
    execution:
      max-rows: 10000
      statement-timeout: 30s
      default-fetch-size: 1000
  ai:
    provider: ${AI_PROVIDER:anthropic}
  notifications:
    public-base-url: ${ACCESSFLOW_PUBLIC_BASE_URL:http://localhost:5173}
    retry:
      first: PT30S
      second: PT2M
      third: PT10M

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
