spring:
  application:
    name: accessflow-app
  
  datasource:
    url: jdbc:postgresql://localhost:5432/accessflow
    username: accessflow
    password: accessflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
