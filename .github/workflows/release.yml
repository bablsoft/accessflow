name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version (e.g. 1.2.3) — without leading v"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' \
            || { echo "::error::version must be semver (X.Y.Z[-suffix])"; exit 1; }

      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Bump Maven version
        working-directory: backend
        run: mvn -B -q versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Bump frontend version
        working-directory: frontend
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "frontend/package.json already at $VERSION, skipping npm version"
          else
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Configure git identity
        uses: fregante/setup-git-user@v2

      - name: Create release commit & push tag (detached)
        run: |
          git checkout --detach
          git add backend/pom.xml frontend/package.json frontend/package-lock.json
          git commit -m "chore(release): v${{ inputs.version }}"
          git push origin HEAD:refs/tags/v${{ inputs.version }}

      - name: Compute previous tag
        id: previous-tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          PREV=$(git tag -l 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous tag resolved to: ${PREV:-<none>}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/accessflow-backend:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/accessflow-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ inputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/accessflow-frontend:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/accessflow-frontend:latest

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          previous_tag: ${{ steps.previous-tag.outputs.tag }}
          body: |
            ## Container images

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/accessflow-backend:${{ inputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/accessflow-frontend:${{ inputs.version }}
            ```

            Multi-arch: `linux/amd64`, `linux/arm64`.

            ## Helm chart

            ```bash
            helm repo add accessflow https://${{ github.repository_owner }}.github.io/accessflow
            helm repo update
            helm install accessflow accessflow/accessflow --version ${{ inputs.version }} \
              --namespace accessflow --create-namespace
            ```

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Set chart version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          yq -i '.version = strenv(VERSION) | .appVersion = strenv(VERSION)' charts/accessflow/Chart.yaml

      - name: Register chart dependency repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm dependency update charts/accessflow
          helm package charts/accessflow --destination .cr-release-packages

      # We publish the chart to gh-pages directly (chart-releaser-action couples
      # this with a GitHub release asset upload, which fails under the repo's
      # immutable-releases policy). Plain `helm repo index` + `git push` is
      # enough for `helm repo add` consumers; release artefacts stay container-only.
      - name: Publish chart to gh-pages
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          VERSION: ${{ inputs.version }}
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cp .cr-release-packages/*.tgz /tmp/gh-pages/
          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index /tmp/gh-pages --url "https://${REPO_OWNER}.github.io/accessflow" --merge /tmp/gh-pages/index.yaml
          else
            helm repo index /tmp/gh-pages --url "https://${REPO_OWNER}.github.io/accessflow"
          fi
          cd /tmp/gh-pages
          git add .
          git -c user.email=github-actions[bot]@users.noreply.github.com \
              -c user.name='github-actions[bot]' \
              commit -m "Release accessflow-${VERSION}"
          git push origin HEAD:gh-pages
