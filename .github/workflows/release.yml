name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version (e.g. 1.2.3) — without leading v"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' \
            || { echo "::error::version must be semver (X.Y.Z[-suffix])"; exit 1; }

      # A `-suffix` in the version (e.g. 1.0.0-beta.1) makes this a pre-release: the moving
      # image tag becomes `:beta` instead of `:latest`, the GitHub Release is flagged
      # prerelease, and the stable connectors-index.json is left pointed at the last GA.
      # A plain X.Y.Z resolves the moving tag to `latest` — identical to GA behavior.
      - name: Classify release & compute image tags
        id: meta
        env:
          VERSION: ${{ inputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          BE="ghcr.io/${OWNER}/accessflow-backend"
          FE="ghcr.io/${OWNER}/accessflow-frontend"
          case "$VERSION" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT"; MOVING=beta ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT"; MOVING=latest ;;
          esac
          {
            echo "backend_tags<<EOF";  echo "${BE}:${VERSION}"; echo "${BE}:${MOVING}"; echo "EOF"
            echo "frontend_tags<<EOF"; echo "${FE}:${VERSION}"; echo "${FE}:${MOVING}"; echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Engine plugins (issues #414/#418) are built BEFORE the Maven version bump: each plugin has
      # its own version line (never touched by versions:set) and compiles against the backend
      # version its pom declares. Builds are reproducible, so each shaded jar must match the
      # sha256 pinned in its connectors/<id>/connector.json manifest — drift fails the release.
      # Discovery loop over engines/*: a new engine plugin needs zero edits here.
      - name: Install backend plain jar (engine plugins compile against core.api)
        run: mvn -B -f backend/pom.xml install -DskipTests

      - name: Build engine plugins
        run: |
          set -euo pipefail
          for d in engines/*/; do
            mvn -B -f "${d}pom.xml" -DskipTests clean package
          done

      - name: Verify engine plugin sha256 pins
        run: |
          set -euo pipefail
          node .github/scripts/check-engine-pins.mjs
          mkdir -p .engines-artifacts
          cp engines/*/target/*-all.jar .engines-artifacts/

      - name: Bump Maven version
        working-directory: backend
        run: mvn -B -q versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Bump frontend version
        working-directory: frontend
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "frontend/package.json already at $VERSION, skipping npm version"
          else
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Configure git identity
        uses: fregante/setup-git-user@v2

      - name: Create release commit & push tag (detached)
        run: |
          git checkout --detach
          git add backend/pom.xml frontend/package.json frontend/package-lock.json
          git commit -m "chore(release): v${{ inputs.version }}"
          git push origin HEAD:refs/tags/v${{ inputs.version }}

      - name: Compute previous tag
        id: previous-tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          PREV=$(git tag -l 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous tag resolved to: ${PREV:-<none>}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          # Context is the repo root so the connector catalog (./connectors) is
          # bundled into the jar; the Dockerfile lives under backend/.
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.backend_tags }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ inputs.version }}
          tags: ${{ steps.meta.outputs.frontend_tags }}

      - name: Create GitHub Release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          previous_tag: ${{ steps.previous-tag.outputs.tag }}
          # When true, GitHub never marks this the "Latest" release.
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body: |
            ${{ steps.meta.outputs.prerelease == 'true' && '⚠️ **Pre-release — internal testing only.** Pull `:beta` or the exact version tag below; `:latest` still points at the last stable release.' || '' }}

            ## Container images

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/accessflow-backend:${{ inputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/accessflow-frontend:${{ inputs.version }}
            ```

            Multi-arch: `linux/amd64`, `linux/arm64`.

            ## Helm chart

            ```bash
            helm repo add accessflow https://${{ github.repository_owner }}.github.io/accessflow
            helm repo update
            helm install accessflow accessflow/accessflow --version ${{ inputs.version }} \
              --namespace accessflow --create-namespace
            ```

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Set chart version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          yq -i '.version = strenv(VERSION) | .appVersion = strenv(VERSION)' charts/accessflow/Chart.yaml

      - name: Register chart dependency repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm dependency update charts/accessflow
          helm package charts/accessflow --destination .cr-release-packages

      # Connector catalog artifacts (issue #334). Published to gh-pages alongside
      # the Helm chart — GitHub Release asset uploads are blocked by the repo's
      # immutable-releases policy (see the chart publish step below), so the
      # bundle + index ride the same mechanism that already works.
      - name: Build connectors artifacts
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p .connectors-artifacts
          tar czf ".connectors-artifacts/connectors-bundle-${VERSION}.tar.gz" connectors
          node --input-type=module - "$VERSION" > ".connectors-artifacts/connectors-index.json" <<'NODE'
          import { readdirSync, readFileSync } from 'node:fs';
          import path from 'node:path';
          const version = process.argv[2];
          const root = 'connectors';
          const connectors = readdirSync(root, { withFileTypes: true })
            .filter((d) => d.isDirectory() && d.name !== 'schema')
            .map((d) => JSON.parse(readFileSync(path.join(root, d.name, 'connector.json'), 'utf8')))
            .map((m) => ({
              id: m.id, name: m.name, dbType: m.dbType, vendor: m.vendor ?? null,
              bundled: m.bundled,
              driver: m.driver ? { type: m.driver.type, sha256: m.driver.sha256 } : null,
            }));
          process.stdout.write(JSON.stringify({ version, connectors }, null, 2) + '\n');
          NODE

      # We publish the chart to gh-pages directly (chart-releaser-action couples
      # this with a GitHub release asset upload, which fails under the repo's
      # immutable-releases policy). Plain `helm repo index` + `git push` is
      # enough for `helm repo add` consumers; release artefacts stay container-only.
      - name: Publish chart to gh-pages
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          VERSION: ${{ inputs.version }}
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          cp .cr-release-packages/*.tgz /tmp/gh-pages/
          # Connector catalog artifacts (issue #334): versioned bundle + a
          # stable index.json overwritten on GA releases only. A pre-release
          # uploads its versioned bundle but leaves the stable index pointed at
          # the last GA, so beta runs never relabel the catalog pointer.
          mkdir -p /tmp/gh-pages/connectors
          cp .connectors-artifacts/connectors-bundle-*.tar.gz /tmp/gh-pages/connectors/
          if [ "${{ steps.meta.outputs.prerelease }}" = "false" ]; then
            cp .connectors-artifacts/connectors-index.json /tmp/gh-pages/connectors/connectors-index.json
          fi
          # Engine plugin jars (issues #414/#418): each engine's connector manifest points
          # fresh installs at this URL. Idempotent — the reproducible builds re-upload
          # byte-identical content when a plugin version didn't change.
          mkdir -p /tmp/gh-pages/engines
          cp .engines-artifacts/*-all.jar /tmp/gh-pages/engines/
          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index /tmp/gh-pages --url "https://${REPO_OWNER}.github.io/accessflow" --merge /tmp/gh-pages/index.yaml
          else
            helm repo index /tmp/gh-pages --url "https://${REPO_OWNER}.github.io/accessflow"
          fi
          cd /tmp/gh-pages
          git add .
          git -c user.email=github-actions[bot]@users.noreply.github.com \
              -c user.name='github-actions[bot]' \
              commit -m "Release accessflow-${VERSION}"
          git push origin HEAD:gh-pages
