name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm: ${{ steps.filter.outputs.helm }}
      e2e: ${{ steps.filter.outputs.e2e }}
      connectors: ${{ steps.filter.outputs.connectors }}
      engines: ${{ steps.filter.outputs.engines }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'connectors/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            helm:
              - 'charts/**'
              - '.github/workflows/ci.yml'
            connectors:
              - 'connectors/**'
              - '.github/workflows/ci.yml'
            # backend/** is included because the plugin compiles against the backend's core.api —
            # an SPI change can break the plugin or shift its reproducible-build sha pin.
            engines:
              - 'engines/**'
              - 'backend/**'
              - 'connectors/mongodb/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'e2e/**'
              - 'frontend/**'
              - 'backend/**'
              - 'connectors/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Test with Maven
        run: mvn -B clean verify -Pcoverage
        working-directory: backend

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend Test Results
          comment_mode: always

      - name: Publish coverage report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend Code Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        # Coverage thresholds (90% lines/functions/statements, 80% branches)
        # are enforced inside vite.config.ts — this step fails when they slip.
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: frontend/test-results/junit.xml
          check_name: Frontend Test Results
          comment_mode: always

      - name: Publish coverage report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: changes
          name: Frontend Coverage

  helm:
    name: Helm
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Register chart dependency repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build chart dependencies
        run: helm dependency update charts/accessflow

      - name: Lint chart
        run: helm lint charts/accessflow

      - name: Render with defaults (bundled Postgres + Redis, auto-generated secrets)
        run: |
          helm template accessflow charts/accessflow \
            > /tmp/rendered-defaults.yaml

      - name: Render with externally-managed secrets (existingSecret overrides)
        run: |
          helm template accessflow charts/accessflow \
            --set config.encryptionKey.existingSecret=accessflow-encryption-key \
            --set config.jwtPrivateKey.existingSecret=accessflow-jwt-key \
            --set postgresql.auth.existingSecret=accessflow-pg-secret \
            > /tmp/rendered-existing-secrets.yaml

      - name: Render with external Postgres + Redis
        run: |
          helm template accessflow charts/accessflow \
            --set postgresql.enabled=false \
            --set redis.enabled=false \
            --set externalDatabase.host=db.example.com \
            --set externalDatabase.existingSecret=external-db-secret \
            --set audit.db.existingSecret=external-audit-db-secret \
            --set externalRedis.url=redis://r.example.com:6379 \
            > /tmp/rendered-external.yaml

      - name: Render with ingress TLS enabled
        run: |
          helm template accessflow charts/accessflow \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName=accessflow-tls \
            > /tmp/rendered-ingress-tls.yaml

      - name: Render with bootstrap.* fixture (every *SecretRef path)
        run: |
          helm template accessflow charts/accessflow \
            -f charts/accessflow/ci/bootstrap-values.yaml \
            > /tmp/rendered-bootstrap.yaml

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start the e2e stack
        # `--wait` blocks until every service's healthcheck reports healthy
        # (or fails fast). See e2e/docker-compose.e2e.yml for healthchecks.
        run: docker compose -f docker-compose.e2e.yml up --build -d --wait

      - name: Run Playwright tests
        run: npm test

      - name: Dump main stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --no-color

      - name: Tear down main stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      # The setup-wizard spec runs against a separate stack with no admin
      # pre-seeded (`ACCESSFLOW_BOOTSTRAP_ENABLED=false`). Its
      # globalSetup/Teardown in playwright.setup.config.ts bring
      # docker-compose.e2e.setup.yml up/down on ports 5174/8081.
      - name: Run setup-wizard spec
        if: always()
        run: npm run test:setup

      - name: Dump setup-variant stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.setup.yml logs --no-color

      - name: Tear down setup-variant stack
        # Belt-and-suspenders — globalTeardown handles this on success.
        if: always()
        run: docker compose -f docker-compose.e2e.setup.yml down -v || true

      # The SAML SSO spec runs against a third stack that adds a
      # kristophjunge/test-saml-idp (SimpleSAMLphp) container and bootstraps
      # the saml_config row pointing at it. globalSetup/Teardown in
      # playwright.sso.config.ts bring docker-compose.e2e.sso.yml up/down on
      # ports 5175 / 8082 / 8085.
      - name: Run SAML SSO spec
        if: always()
        run: npm run test:sso

      - name: Dump SSO-variant stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.sso.yml logs --no-color

      - name: Tear down SSO-variant stack
        # Belt-and-suspenders — globalTeardown handles this on success.
        if: always()
        run: docker compose -f docker-compose.e2e.sso.yml down -v || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  connectors:
    name: Connectors
    needs: changes
    if: needs.changes.outputs.connectors == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate connector manifests
        run: node .github/scripts/validate-connectors.mjs

  engines:
    name: Engine plugins
    needs: changes
    if: needs.changes.outputs.engines == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-engines-${{ hashFiles('backend/pom.xml', 'engines/mongodb/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-engines-
            ${{ runner.os }}-maven-

      - name: Install backend plain jar (plugin compiles against core.api)
        run: mvn -B -f backend/pom.xml install -DskipTests

      - name: Build and test the MongoDB engine plugin
        run: mvn -B -f engines/mongodb/pom.xml clean verify

      - name: Verify connector manifest sha256 pin matches the built jar
        # The plugin build is reproducible (project.build.outputTimestamp), so the shaded jar's
        # sha256 must equal the pin in connectors/mongodb/connector.json. Drift means the engine
        # (or a core.api type it compiles against) changed without bumping the plugin version and
        # re-pinning — see engines/mongodb/README.md.
        run: |
          set -euo pipefail
          BUILT=$(sha256sum engines/mongodb/target/accessflow-engine-mongodb-*-all.jar | cut -d' ' -f1)
          PINNED=$(node -p "require('./connectors/mongodb/connector.json').driver.sha256")
          echo "built:  $BUILT"
          echo "pinned: $PINNED"
          if [ "$BUILT" != "$PINNED" ]; then
            echo "::error::MongoDB engine plugin sha256 pin drift — bump the plugin version and re-pin (engines/mongodb/README.md)"
            exit 1
          fi

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            engines/mongodb/target/surefire-reports/TEST-*.xml
            engines/mongodb/target/failsafe-reports/TEST-*.xml
          check_name: Engine Plugin Test Results
          comment_mode: always

  # Single required status check for branch protection. This job always runs
  # and succeeds when each upstream job either passed or was correctly skipped
  # (its path filter did not match). Configure branch protection to require
  # only this check ("CI / CI Gate") — never the individual area jobs.
  gate:
    name: CI Gate
    needs: [changes, backend, frontend, helm, e2e, connectors, engines]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all area jobs succeeded or were skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          HELM_RESULT: ${{ needs.helm.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          CONNECTORS_RESULT: ${{ needs.connectors.result }}
          ENGINES_RESULT: ${{ needs.engines.result }}
        run: |
          set -euo pipefail
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Change detection failed: $CHANGES_RESULT"
            exit 1
          fi
          status=0
          for area in backend frontend helm e2e connectors engines; do
            var="$(echo "$area" | tr '[:lower:]' '[:upper:]')_RESULT"
            result="${!var}"
            case "$result" in
              success|skipped)
                echo "$area: $result"
                ;;
              *)
                echo "$area: $result (failed)"
                status=1
                ;;
            esac
          done
          exit "$status"
