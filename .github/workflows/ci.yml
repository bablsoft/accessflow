name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

# Cancel an in-flight run when a newer commit lands on the same ref (PR branch or
# main) — faster feedback and frees the runner pool. Keyed on ref so different
# branches/PRs never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm: ${{ steps.filter.outputs.helm }}
      e2e: ${{ steps.filter.outputs.e2e }}
      connectors: ${{ steps.filter.outputs.connectors }}
      engines: ${{ steps.filter.outputs.engines }}
      terraform: ${{ steps.filter.outputs.terraform }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'connectors/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            helm:
              - 'charts/**'
              - '.github/workflows/ci.yml'
            connectors:
              - 'connectors/**'
              - '.github/workflows/ci.yml'
            # backend/** is included because the plugins compile against the backend's core.api —
            # an SPI change can break a plugin or shift its reproducible-build sha pin.
            # connectors/** is included because each engine's version + sha are pinned in its
            # connectors/<id>/connector.json manifest.
            engines:
              - 'engines/**'
              - 'backend/**'
              - 'connectors/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'e2e/**'
              - 'frontend/**'
              - 'backend/**'
              - 'connectors/**'
              - '.github/workflows/ci.yml'
            # The Terraform/OpenTofu provider (AF-452). Acceptance tests boot a backend built from
            # the working tree, so backend/** is included to catch REST-contract drift.
            terraform:
              - 'terraform-provider/**'
              - 'backend/**'
              - '.github/workflows/ci.yml'
            # Reusable CI Actions + GitLab template (AF-452). The smoke test boots a backend too.
            actions:
              - '.github/actions/**'
              - 'ci-templates/**'
              - 'backend/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Test with Maven
        run: mvn -B clean verify -Pcoverage
        working-directory: backend

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend Test Results
          comment_mode: always

      - name: Publish coverage report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend Code Coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        # Coverage thresholds (90% lines/functions/statements, 80% branches)
        # are enforced inside vite.config.ts — this step fails when they slip.
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: frontend/test-results/junit.xml
          check_name: Frontend Test Results
          comment_mode: always

      - name: Publish coverage report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: changes
          name: Frontend Coverage

  helm:
    name: Helm
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Register chart dependency repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build chart dependencies
        run: helm dependency update charts/accessflow

      - name: Lint chart
        run: helm lint charts/accessflow

      - name: Render with defaults (bundled Postgres + Redis, auto-generated secrets)
        run: |
          helm template accessflow charts/accessflow \
            > /tmp/rendered-defaults.yaml

      - name: Render with externally-managed secrets (existingSecret overrides)
        run: |
          helm template accessflow charts/accessflow \
            --set config.encryptionKey.existingSecret=accessflow-encryption-key \
            --set config.jwtPrivateKey.existingSecret=accessflow-jwt-key \
            --set postgresql.auth.existingSecret=accessflow-pg-secret \
            > /tmp/rendered-existing-secrets.yaml

      - name: Render with external Postgres + Redis
        run: |
          helm template accessflow charts/accessflow \
            --set postgresql.enabled=false \
            --set redis.enabled=false \
            --set externalDatabase.host=db.example.com \
            --set externalDatabase.existingSecret=external-db-secret \
            --set audit.db.existingSecret=external-audit-db-secret \
            --set externalRedis.url=redis://r.example.com:6379 \
            --set backup.enabled=true \
            > /tmp/rendered-external.yaml
          grep -q "kind: CronJob" /tmp/rendered-external.yaml

      - name: Render with ingress TLS enabled
        run: |
          helm template accessflow charts/accessflow \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName=accessflow-tls \
            > /tmp/rendered-ingress-tls.yaml

      - name: Render with bootstrap.* fixture (every *SecretRef path)
        run: |
          helm template accessflow charts/accessflow \
            -f charts/accessflow/ci/bootstrap-values.yaml \
            > /tmp/rendered-bootstrap.yaml

      - name: Render with observability (OTLP export + Grafana dashboards)
        run: |
          helm template accessflow charts/accessflow \
            --set dashboards.enabled=true \
            --set observability.tracing.otlp.enabled=true \
            --set observability.tracing.otlp.endpoint=http://tempo:4318/v1/traces \
            --set observability.tracing.samplingProbability=0.1 \
            > /tmp/rendered-observability.yaml
          grep -q "grafana_dashboard" /tmp/rendered-observability.yaml
          grep -q "OTEL_EXPORTER_OTLP_ENDPOINT" /tmp/rendered-observability.yaml

      - name: Render with backup CronJob + restore Job (AF-458)
        run: |
          helm template accessflow charts/accessflow \
            -f charts/accessflow/examples/values-backup.yaml \
            --set backup.upload.enabled=true \
            --set backup.upload.remote=s3backup:my-bucket/accessflow \
            --set backup.upload.existingSecret=accessflow-rclone \
            --set restore.enabled=true \
            --set restore.dumpFile=accessflow-20260101T000000Z.dump \
            > /tmp/rendered-backup.yaml
          grep -q "kind: CronJob" /tmp/rendered-backup.yaml
          grep -q "pg_dump -Fc" /tmp/rendered-backup.yaml
          grep -q "rclone-upload" /tmp/rendered-backup.yaml
          grep -q "pg_restore --clean --if-exists" /tmp/rendered-backup.yaml
          grep -q "accessflow-20260101T000000Z.dump" /tmp/rendered-backup.yaml

  e2e:
    name: E2E (${{ matrix.variant.name }})
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    strategy:
      # The three stacks use distinct compose project names and non-overlapping
      # ports (5173/8080, 5174/8081, 5175/8082/8085), so one leg per stack runs
      # them on separate runners in parallel instead of sequentially in one job.
      # fail-fast off so one variant failing doesn't cancel the others.
      fail-fast: false
      matrix:
        variant:
          - { name: main,  compose: docker-compose.e2e.yml,       test: "npm test" }
          - { name: setup, compose: docker-compose.e2e.setup.yml, test: "npm run test:setup" }
          - { name: sso,   compose: docker-compose.e2e.sso.yml,   test: "npm run test:sso" }
    env:
      # The setup/sso stacks are brought up by Playwright globalSetup; this tells
      # it to reuse the images pre-built below instead of rebuilding. Harmless for
      # the main leg (it brings its stack up explicitly, also without --build).
      E2E_SKIP_BUILD: "1"
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        # The cached dir holds only the browser binaries; the OS libraries
        # (apt packages) live outside it and must still be installed.
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the two images once with a GitHub Actions layer cache so the
      # dependency-resolution layers (mvn dependency:go-offline / npm install)
      # are reused run-to-run. `load: true` puts the tagged image in the local
      # daemon; the stack then starts with `up` (no --build) and reuses it.
      - name: Build backend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          tags: accessflow-backend:e2e
          load: true
          cache-from: type=gha,scope=e2e-backend
          cache-to: type=gha,mode=max,scope=e2e-backend

      - name: Build frontend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          tags: accessflow-frontend:e2e
          load: true
          cache-from: type=gha,scope=e2e-frontend
          cache-to: type=gha,mode=max,scope=e2e-frontend

      - name: Start the e2e stack
        # Only the main variant brings its stack up here; the setup/sso variants
        # are started by their Playwright globalSetup (which honours
        # E2E_SKIP_BUILD). `--wait` blocks until every healthcheck is healthy.
        if: matrix.variant.name == 'main'
        run: docker compose -f ${{ matrix.variant.compose }} up -d --wait

      - name: Run Playwright tests
        run: ${{ matrix.variant.test }}

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f ${{ matrix.variant.compose }} logs --no-color

      - name: Tear down stack
        # Belt-and-suspenders — the setup/sso globalTeardown also do this on success.
        if: always()
        run: docker compose -f ${{ matrix.variant.compose }} down -v || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.variant.name }}
          path: e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  connectors:
    name: Connectors
    needs: changes
    if: needs.changes.outputs.connectors == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate connector manifests
        run: node .github/scripts/validate-connectors.mjs

  engines:
    name: Engine plugin (${{ matrix.engine }})
    needs: changes
    if: needs.changes.outputs.engines == 'true'
    runs-on: ubuntu-latest
    strategy:
      # One leg per plugin so they build + test on separate runners in parallel
      # instead of in a sequential shell loop — wall-clock drops to the slowest
      # single engine. fail-fast off so one engine failing doesn't cancel the rest.
      # Adding a new engine means adding its id here (and to release.yml).
      fail-fast: false
      matrix:
        engine: [mongodb, couchbase, redis, cassandra, elasticsearch, dynamodb, neo4j]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-engines-${{ hashFiles('backend/pom.xml', 'engines/*/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-engines-
            ${{ runner.os }}-maven-

      - name: Install backend plain jar (plugins compile against core.api)
        run: mvn -B -f backend/pom.xml install -DskipTests

      - name: Build and test the engine plugin
        run: mvn -B -f engines/${{ matrix.engine }}/pom.xml clean verify

      - name: Verify connector manifest sha256 pin matches the built jar
        # The build is reproducible (project.build.outputTimestamp), so the shaded jar's
        # sha256 must equal the pin in connectors/${{ matrix.engine }}/connector.json.
        # Drift means the engine (or a core.api type it compiles against) changed without
        # bumping the plugin version and re-pinning — see docs/15-engine-sdk.md.
        run: node .github/scripts/check-engine-pins.mjs ${{ matrix.engine }}

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            engines/${{ matrix.engine }}/target/surefire-reports/TEST-*.xml
            engines/${{ matrix.engine }}/target/failsafe-reports/TEST-*.xml
          check_name: Engine ${{ matrix.engine }} Test Results
          comment_mode: "off"

  terraform:
    name: Terraform provider
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform-provider
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: terraform-provider/go.mod
          cache-dependency-path: terraform-provider/go.sum

      - name: Format check
        run: test -z "$(gofmt -l .)" || { echo '::error::gofmt needed:'; gofmt -l .; exit 1; }

      - name: Vet
        run: go vet ./...

      # golangci-lint is run locally via `make lint` (it requires a build matching the module's
      # go.mod toolchain, which test-only deps pin ahead of released golangci-lint builds); CI
      # relies on gofmt + go vet here.

      - name: Unit tests
        run: go test ./... -count=1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: docker/setup-buildx-action@v3

      # Build the backend from the working tree (the service-account bootstrap path is new),
      # reusing the e2e layer cache for warmth.
      - name: Build backend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          tags: accessflow-backend:acc
          load: true
          cache-from: type=gha,scope=e2e-backend
          cache-to: type=gha,mode=max,scope=tf-acc-backend

      - name: Start backend with a bootstrap service account
        working-directory: .
        run: docker compose -f docker-compose.yml -f terraform-provider/docker-compose.acc.yml up -d --wait backend

      - name: Wait for the bootstrap service-account key
        working-directory: .
        run: |
          for _ in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' \
              -H 'Authorization: ApiKey af_acctest_terraform_provider_ci_key_0001' \
              http://localhost:8080/api/v1/datasources)"
            if [ "$code" = "200" ]; then echo "service-account key ready"; exit 0; fi
            echo "waiting for bootstrap service-account key (HTTP $code)…"; sleep 2
          done
          echo "::error::service-account key never became usable"; exit 1

      - name: Acceptance tests
        env:
          TF_ACC: "1"
          ACCESSFLOW_ENDPOINT: http://localhost:8080
          ACCESSFLOW_API_KEY: af_acctest_terraform_provider_ci_key_0001
        run: go test ./internal/provider/ -run TestAcc -count=1 -timeout 20m

      - name: Backend logs on failure
        if: failure()
        working-directory: .
        run: docker compose -f docker-compose.yml -f terraform-provider/docker-compose.acc.yml logs --no-color backend

      - name: Tear down
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.yml -f terraform-provider/docker-compose.acc.yml down -v || true

  actions:
    name: CI Actions
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    env:
      AF_ENDPOINT: http://localhost:8080
      AF_KEY: af_acctest_terraform_provider_ci_key_0001
    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck action scripts
        run: shellcheck .github/actions/*/*.sh

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          tags: accessflow-backend:acc
          load: true
          cache-from: type=gha,scope=e2e-backend
          cache-to: type=gha,mode=max,scope=tf-acc-backend

      - name: Start backend with a bootstrap service account
        run: docker compose -f docker-compose.yml -f terraform-provider/docker-compose.acc.yml up -d --wait backend

      - name: Wait for the bootstrap service-account key
        run: |
          for _ in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: ApiKey ${AF_KEY}" "${AF_ENDPOINT}/api/v1/datasources")"
            if [ "$code" = "200" ]; then echo "service-account key ready"; exit 0; fi
            echo "waiting for bootstrap service-account key (HTTP $code)…"; sleep 2
          done
          echo "::error::service-account key never became usable"; exit 1

      - name: Smoke — provision datasource (create)
        id: ds
        uses: ./.github/actions/provision-datasource
        with:
          endpoint: ${{ env.AF_ENDPOINT }}
          api-key: ${{ env.AF_KEY }}
          name: ci-smoke-db
          db-type: POSTGRESQL
          host: postgres
          port: "5432"
          database-name: accessflow
          username: accessflow
          password: accessflow
          ssl-mode: DISABLE
          # No AI config in the smoke stack — disable AI analysis or create returns 422.
          ai-analysis-enabled: "false"

      - name: Smoke — re-provision (idempotent, same id)
        id: ds2
        uses: ./.github/actions/provision-datasource
        with:
          endpoint: ${{ env.AF_ENDPOINT }}
          api-key: ${{ env.AF_KEY }}
          name: ci-smoke-db
          db-type: POSTGRESQL
          host: postgres
          port: "5432"
          database-name: accessflow
          username: accessflow
          password: accessflow
          ssl-mode: DISABLE
          ai-analysis-enabled: "false"

      - name: Assert idempotency
        run: |
          test "${{ steps.ds.outputs.id }}" = "${{ steps.ds2.outputs.id }}" \
            || { echo "::error::provision-datasource was not idempotent"; exit 1; }

      - name: Auto-approve SELECTs so run-query reaches EXECUTED
        run: |
          curl -fsS -X POST -H "Authorization: ApiKey ${AF_KEY}" -H 'Content-Type: application/json' \
            -d '{"name":"ci-auto-approve","priority":1,"action":"AUTO_APPROVE","condition":{"type":"query_type","any_of":["SELECT"]}}' \
            "${AF_ENDPOINT}/api/v1/admin/routing-policies"

      - name: Smoke — run query
        uses: ./.github/actions/run-query
        with:
          endpoint: ${{ env.AF_ENDPOINT }}
          api-key: ${{ env.AF_KEY }}
          datasource-id: ${{ steps.ds.outputs.id }}
          sql: "SELECT 1"
          timeout-seconds: "180"

      - name: Backend logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f terraform-provider/docker-compose.acc.yml logs --no-color backend

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f terraform-provider/docker-compose.acc.yml down -v || true

  # Single required status check for branch protection. This job always runs
  # and succeeds when each upstream job either passed or was correctly skipped
  # (its path filter did not match). Configure branch protection to require
  # only this check ("CI / CI Gate") — never the individual area jobs.
  gate:
    name: CI Gate
    needs: [changes, backend, frontend, helm, e2e, connectors, engines, terraform, actions]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all area jobs succeeded or were skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          HELM_RESULT: ${{ needs.helm.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          CONNECTORS_RESULT: ${{ needs.connectors.result }}
          ENGINES_RESULT: ${{ needs.engines.result }}
          TERRAFORM_RESULT: ${{ needs.terraform.result }}
          ACTIONS_RESULT: ${{ needs.actions.result }}
        run: |
          set -euo pipefail
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Change detection failed: $CHANGES_RESULT"
            exit 1
          fi
          status=0
          for area in backend frontend helm e2e connectors engines terraform actions; do
            var="$(echo "$area" | tr '[:lower:]' '[:upper:]')_RESULT"
            result="${!var}"
            case "$result" in
              success|skipped)
                echo "$area: $result"
                ;;
              *)
                echo "$area: $result (failed)"
                status=1
                ;;
            esac
          done
          exit "$status"
