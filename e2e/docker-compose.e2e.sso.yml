# AccessFlow End-to-End test stack — SSO variant (SAML)
#
# Same shape as docker-compose.e2e.yml, but adds a `kristophjunge/test-saml-idp`
# (SimpleSAMLphp) container as a mock IdP and bootstraps the SAML config so
# `GET /api/v1/auth/saml/enabled` reports true and the LoginPage renders the
# "Continue with SAML SSO" button. The spec drives the full IdP roundtrip.
#
# Distinct host ports (5175 / 8082 / 8085) and a distinct compose project
# name (`accessflow-e2e-sso`) so this stack can coexist with the main
# (docker-compose.e2e.yml — 5173 / 8080) and setup-wizard
# (docker-compose.e2e.setup.yml — 5174 / 8081) variants.
#
# How the mock IdP wires together:
#   * The IdP container publishes Apache on host port 8085. Its
#     SIMPLESAMLPHP_BASEURLPATH is set to the absolute URL
#     `http://localhost:8085/simplesaml/`, so SimpleSAMLphp emits the SAME
#     entityID / SSO URL in metadata regardless of whether the request came
#     from the backend (over the docker network) or the browser (host).
#   * The backend fetches metadata at boot via the docker network alias
#     `saml-idp:8080` — but the entityID and SSO URL inside that XML are
#     `http://localhost:8085/...`, which is what the browser later follows.
#   * Spring SAML's RelyingPartyRegistrations.fromMetadataLocation picks the
#     IdP's signing cert out of the XML — no manual cert pinning.
#
# Frontend container runtime config is overridden via bind-mount of
# `./runtime-config.sso.js` so the browser talks to backend on 8082.
#
# Demo IdP users baked into the image: user1 / user1pass (email
# user1@example.com), user2 / user2pass.
#
# ⚠️  DEMO ONLY — the JWT private key and encryption key below are the same
#     demo defaults used by the root docker-compose.yml. They are committed
#     deliberately and are NOT safe for any deployment that handles real data.

name: accessflow-e2e-sso

services:
  postgres:
    # pgvector-enabled image: the `vector` extension (deploy/postgres-init/02-pgvector.sql) is
    # required by the RAG knowledge base.
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: accessflow
      POSTGRES_USER: accessflow
      POSTGRES_PASSWORD: accessflow
    volumes:
      - ../deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - e2e-sso-network

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - e2e-sso-network

  saml-idp:
    # SimpleSAMLphp IdP pre-configured to sign SAML assertions for a single
    # SP. Two demo users are baked into the image: user1 / user1pass (email
    # user1@example.com) and user2 / user2pass. The auth-saml-login.spec.ts
    # drives user1 through the login flow.
    #
    # SimpleSAMLphp derives the entityID + SSOService.php URL from the
    # request's Host header — `SIMPLESAMLPHP_BASEURLPATH` does NOT override
    # this behaviour in the 1.15 image. So:
    #   * The backend fetches metadata via the docker-network alias
    #     `saml-idp:8080`, which produces a metadata XML with
    #     `entityID="http://saml-idp:8080/simplesaml/..."` and the same
    #     SSOService.php Location.
    #   * Spring SAML extracts that SSO URL and redirects the browser there.
    #   * Playwright's chromium is launched with `--host-resolver-rules` so
    #     `saml-idp:8080` resolves to `127.0.0.1:8085` (the published port
    #     on the host). See playwright.sso.config.ts.
    # SP entity ID and ACS URL are configured against the backend's
    # browser-facing URLs (host port 8082) — the IdP's signed
    # SAMLResponse is auto-form-submitted from the browser to that URL.
    image: kristophjunge/test-saml-idp:1.15
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: http://localhost:8082/api/v1/auth/saml/metadata/default
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: http://localhost:8082/api/v1/auth/saml/acs/default
      SIMPLESAMLPHP_SP_SINGLE_LOGOUT_SERVICE: http://localhost:8082/api/v1/auth/saml/logout
      SIMPLESAMLPHP_ADMIN_PASSWORD: secret
      SIMPLESAMLPHP_SECRET_SALT: e2e-sso-variant-salt
    healthcheck:
      # Apache returns 200 on /simplesaml/saml2/idp/metadata.php once
      # SimpleSAMLphp finishes warming up. The image is debian-based with
      # curl available (wget is not installed), so we use `curl -sf` here
      # instead of the busybox-style `wget --spider` used by the other
      # services in this file.
      test: ["CMD-SHELL", "curl -sf -o /dev/null http://127.0.0.1:8080/simplesaml/saml2/idp/metadata.php || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    ports:
      - "8085:8080"
    networks:
      - e2e-sso-network

  mock-oauth2-server:
    # navikt/mock-oauth2-server is a tiny standalone OAuth 2.0 / OIDC provider
    # used as a stand-in for Google / Auth0 / Keycloak in tests. Its issuer
    # path is derived from the request Host header, so the same hostname
    # (mock-oauth2-server:8080) is honoured both by the backend (over the
    # docker network) and the browser (via Chromium's --host-resolver-rules
    # remap to 127.0.0.1:8086 — see playwright.sso.config.ts).
    #
    # The image hosts an interactive "Debugger" login form at /<issuer>/authorize
    # that lets tests set the subject / claims and submit, returning an
    # authorization code that the backend exchanges for a JWT. Default issuer
    # path is "/default" — the OIDC config below points at that issuer.
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    # No healthcheck: the image is a JIB-built distroless JVM with no shell or
    # HTTP probe tooling (no wget, no curl, no sh). The server warms up in
    # ~2-3 s. The backend resolves OIDC metadata lazily on the first authorize
    # request (DynamicClientRegistrationRepository.build), so by the time the
    # Playwright spec clicks the OAuth2 button, mock-oauth2-server has been
    # ready for many seconds.
    ports:
      - "8086:8080"
    networks:
      - e2e-sso-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      saml-idp:
        condition: service_healthy
      mock-oauth2-server:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/accessflow
      DB_USER: accessflow
      DB_PASSWORD: accessflow
      AUDIT_DB_USER: accessflow_audit
      AUDIT_DB_PASSWORD: accessflow_audit
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGIN: http://localhost:5175
      ACCESSFLOW_PUBLIC_BASE_URL: http://localhost:5175
      # Demo-only — see warning at the top of this file.
      ENCRYPTION_KEY: 40f05f39ca7296247ac4c12efdf091d8e753e22b96764462473d6e7c9abc550e
      JWT_PRIVATE_KEY: |
        -----BEGIN PRIVATE KEY-----
        MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQDpKubqwZpI/V7x
        zdZ1kretfg9BOiEKklPjfE8f4FHLSkog18xIgwLx1nnkD58Gsud3ynGc6kHFdNuJ
