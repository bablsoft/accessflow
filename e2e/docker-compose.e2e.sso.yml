      # Deterministic admin so the spec can fall back to password login if it
      # ever needs to (currently it does not). The org is the JIT-provisioning
      # target for the SAML user.
      ACCESSFLOW_BOOTSTRAP_ENABLED: "true"
      ACCESSFLOW_BOOTSTRAP_ORGANIZATION_NAME: "E2E Test Org"
      ACCESSFLOW_BOOTSTRAP_ADMIN_EMAIL: e2e@accessflow.test
      ACCESSFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME: "E2E Admin"
      ACCESSFLOW_BOOTSTRAP_ADMIN_PASSWORD: "E2ePassword!123"
      # Bootstrap SAML config — reconciled into saml_config on
      # ApplicationReadyEvent, see SamlReconciler. The idp-metadata-url uses
      # the docker-network alias so the backend can reach the IdP at boot;
      # the entityID inside that XML is `http://localhost:8085/...` so the
      # browser-facing SSO redirect matches what Spring SAML mints.
      ACCESSFLOW_BOOTSTRAP_SAML_ENABLED: "true"
      ACCESSFLOW_BOOTSTRAP_SAML_IDP_METADATA_URL: http://saml-idp:8080/simplesaml/saml2/idp/metadata.php
      # entityID inside the IdP's metadata when fetched via the docker
      # network — Spring SAML pins this for SAMLResponse issuer validation.
      ACCESSFLOW_BOOTSTRAP_SAML_IDP_ENTITY_ID: http://saml-idp:8080/simplesaml/saml2/idp/metadata.php
      ACCESSFLOW_BOOTSTRAP_SAML_SP_ENTITY_ID: http://localhost:8082/api/v1/auth/saml/metadata/default
      ACCESSFLOW_BOOTSTRAP_SAML_ACS_URL: http://localhost:8082/api/v1/auth/saml/acs/default
      ACCESSFLOW_BOOTSTRAP_SAML_ATTR_EMAIL: email
      ACCESSFLOW_BOOTSTRAP_SAML_ATTR_DISPLAY_NAME: displayName
      ACCESSFLOW_BOOTSTRAP_SAML_DEFAULT_ROLE: ANALYST
      ACCESSFLOW_BOOTSTRAP_SAML_ACTIVE: "true"
      # Bootstrap a generic OIDC provider pointed at the mock-oauth2-server
      # container. The issuer URL uses the docker-network hostname; both the
      # backend (over docker DNS) and the browser (via Chromium's
      # --host-resolver-rules MAP mock-oauth2-server:8080 127.0.0.1:8086)
      # resolve it to the right place, so the `iss` claim in the issued JWT
      # matches what the backend's ClientRegistration expects either way.
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_PROVIDER: OIDC
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_DISPLAY_NAME: Mock OAuth2
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_CLIENT_ID: accessflow-e2e
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_CLIENT_SECRET: e2e-client-secret
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_AUTHORIZATION_URI: http://mock-oauth2-server:8080/default/authorize
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_TOKEN_URI: http://mock-oauth2-server:8080/default/token
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_USER_INFO_URI: http://mock-oauth2-server:8080/default/userinfo
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_JWK_SET_URI: http://mock-oauth2-server:8080/default/jwks
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_ISSUER_URI: http://mock-oauth2-server:8080/default
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_SCOPES_OVERRIDE: "openid email profile"
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_DEFAULT_ROLE: ANALYST
      ACCESSFLOW_BOOTSTRAP_OAUTH2_0_ACTIVE: "true"
      # IdP signing certificate — the default self-signed cert baked into
      # kristophjunge/test-saml-idp:1.15 at /var/www/simplesamlphp/cert/server.crt.
      # DynamicRelyingPartyRegistrationRepository requires this column to be
      # populated (it won't trust the cert published inside metadata alone);
      # the bootstrap reconciler encrypts and persists this PEM into
      # saml_config.idp_signing_cert_pem. If the IdP image bumps a cert,
