    healthcheck:
      # /actuator/health is permitAll. busybox wget is present in the
      # eclipse-temurin:25-jre-alpine runtime stage of the backend image.
      # 127.0.0.1 (not localhost) — busybox resolves localhost to ::1 first.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "8082:8080"
    networks:
      - e2e-sso-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Override the baked-in runtime-config.js so the browser talks to the
      # variant backend on host port 8082 instead of the default 8080.
      - ./runtime-config.sso.js:/usr/share/nginx/html/runtime-config.js:ro
    healthcheck:
      # 127.0.0.1 rather than localhost: inside the container, busybox wget
      # resolves "localhost" to ::1 first and nginx only binds IPv4 by default.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5175:80"
    networks:
      - e2e-sso-network

networks:
  e2e-sso-network:
    driver: bridge
