      # Bootstrap reconciler seeds the deterministic E2E admin on startup.
      ACCESSFLOW_BOOTSTRAP_ENABLED: "true"
      ACCESSFLOW_BOOTSTRAP_ORGANIZATION_NAME: "E2E Test Org"
      ACCESSFLOW_BOOTSTRAP_ADMIN_EMAIL: e2e@accessflow.test
      ACCESSFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME: "E2E Admin"
      ACCESSFLOW_BOOTSTRAP_ADMIN_PASSWORD: "E2ePassword!123"
      # System SMTP points at the in-stack Mailcrab catcher so password reset
      # (and any future transactional email) actually issues tokens and lets
      # auth-forgot-password.spec.ts pull the rendered email back.
      ACCESSFLOW_BOOTSTRAP_SYSTEM_SMTP_ENABLED: "true"
      ACCESSFLOW_BOOTSTRAP_SYSTEM_SMTP_HOST: mailcrab
      ACCESSFLOW_BOOTSTRAP_SYSTEM_SMTP_PORT: "1025"
      ACCESSFLOW_BOOTSTRAP_SYSTEM_SMTP_TLS: "false"
      ACCESSFLOW_BOOTSTRAP_SYSTEM_SMTP_FROM_ADDRESS: noreply@accessflow.test
      ACCESSFLOW_BOOTSTRAP_SYSTEM_SMTP_FROM_NAME: AccessFlow E2E
      # Statement timeout lowered from the 30s default so the AF-267 timeout
      # spec (SELECT pg_sleep(5) → FAILED) fires in ~3s instead of bumping
      # past Playwright's per-test timeout. Other specs run sub-millisecond
      # SQL so this override is invisible to them.
      ACCESSFLOW_PROXY_EXECUTION_STATEMENT_TIMEOUT: PT3S
      # Lower the scheduled-run poll interval so the AF-345 query-scheduling spec
      # fires its scheduled execution within the Playwright per-test budget.
      ACCESSFLOW_WORKFLOW_SCHEDULED_RUN_POLL_INTERVAL: PT1S
      # AF-347: bootstrap a mock OpenAI-compatible ai_config wired to the
      # mock-ai (WireMock) container so the AI analysis listener can produce
      # real ai_analyses rows the admin dashboard spec then reads.
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_NAME: e2e-mock-openai
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_PROVIDER: OPENAI
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_MODEL: gpt-4o-mock
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_ENDPOINT: http://mock-ai:8080
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_API_KEY: dummy-key-for-mock
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_TIMEOUT_MS: "10000"
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_MAX_PROMPT_TOKENS: "4000"
      ACCESSFLOW_BOOTSTRAP_AICONFIGS_0_MAX_COMPLETION_TOKENS: "1000"
    healthcheck:
      # /actuator/health is permitAll. busybox wget is present in the
      # eclipse-temurin:25-jre-alpine runtime stage of the backend image.
      # 127.0.0.1 (not localhost) — busybox resolves localhost to ::1 first.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "8080:8080"
    networks:
      - e2e-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 rather than localhost: inside the container, busybox wget
      # resolves "localhost" to ::1 first and nginx only binds IPv4 by default.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5173:80"
    networks:
      - e2e-network

networks:
  e2e-network:
    driver: bridge
