# AccessFlow End-to-End test stack
#
# Brings up Postgres + Redis + backend (built from ../backend) + frontend
# (built from ../frontend) for Playwright to drive. Every service has a
# healthcheck so `docker compose up --wait` blocks until the stack is ready.
#
# The backend boots with `ACCESSFLOW_BOOTSTRAP_ENABLED=true`, which makes the
# bootstrap reconciler create the org + admin on ApplicationReadyEvent. See
# e2e/README.md for the seeded admin credentials.
#
# No persistent volumes — each compose-up starts from an empty database so
# the reconciler always re-seeds the admin deterministically.
#
# ⚠️  DEMO ONLY — the JWT private key and encryption key below are the same
#     demo defaults used by the root docker-compose.yml. They are committed
#     deliberately and are NOT safe for any deployment that handles real data.

services:
  postgres:
    # pgvector-enabled image: the `vector` extension (deploy/postgres-init/02-pgvector.sql) is
    # required by the RAG knowledge base.
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: accessflow
      POSTGRES_USER: accessflow
      POSTGRES_PASSWORD: accessflow
    volumes:
      - ../deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - e2e-network

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - e2e-network

  mailcrab:
    # Mail catcher — captures all outbound SMTP from the backend and exposes
    # captured messages over an HTTP/JSON API on port 1080. Used by
    # tests/auth-forgot-password.spec.ts to fetch the rendered reset email and
    # extract the one-time token from the URL. Plaintext SMTP on 1025; no auth.
    image: marlonb/mailcrab:latest
    healthcheck:
      # Mailcrab returns 200 + JSON array (`[]` when empty) on /api/messages,
      # which doubles as a liveness probe. The image is alpine-based and has
      # wget available.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:1080/api/messages || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      # HTTP/JSON API published to host so Playwright can poll it. SMTP (1025)
      # stays internal — only the backend container talks to it.
      - "1080:1080"
    networks:
      - e2e-network

  mock-ai:
    # WireMock stands in for an OpenAI Chat Completions endpoint so the AI
    # analysis listener can produce real ai_analyses rows during e2e.
    # See AF-347. Mappings live in ../fixtures/mock-ai/mappings/.
    image: wiremock/wiremock:3.10.0
    volumes:
      - ./fixtures/mock-ai/mappings:/home/wiremock/mappings:ro
    healthcheck:
      # WireMock's /__admin/health endpoint only answers GET (not HEAD), so
      # `wget --spider` returns 404. Use `wget -qO /dev/null` instead — it
      # issues a GET and exits 0 only on 2xx.
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - e2e-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailcrab:
        condition: service_healthy
      mock-ai:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/accessflow
      DB_USER: accessflow
      DB_PASSWORD: accessflow
      AUDIT_DB_USER: accessflow_audit
      AUDIT_DB_PASSWORD: accessflow_audit
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      ACCESSFLOW_PUBLIC_BASE_URL: http://localhost:5173
      # Demo-only — see warning at the top of this file.
      ENCRYPTION_KEY: 40f05f39ca7296247ac4c12efdf091d8e753e22b96764462473d6e7c9abc550e
