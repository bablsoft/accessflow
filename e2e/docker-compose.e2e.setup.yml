      # No admin pre-seeded — bootstrap reconciler is off. The frontend's
      # GET /api/v1/auth/setup-status will report `setup_required: true` until
      # the spec drives the wizard to create the first admin.
      ACCESSFLOW_BOOTSTRAP_ENABLED: "false"
    healthcheck:
      # /actuator/health is permitAll. busybox wget is present in the
      # eclipse-temurin:25-jre-alpine runtime stage of the backend image.
      # 127.0.0.1 (not localhost) — busybox resolves localhost to ::1 first.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "8081:8080"
    networks:
      - e2e-setup-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Override the image's baked-in runtime-config.js so the browser talks
      # to the variant backend on host port 8081 instead of the default 8080.
      - ./runtime-config.setup.js:/usr/share/nginx/html/runtime-config.js:ro
    healthcheck:
      # 127.0.0.1 rather than localhost: inside the container, busybox wget
      # resolves "localhost" to ::1 first and nginx only binds IPv4 by default.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5174:80"
    networks:
      - e2e-setup-network

networks:
  e2e-setup-network:
    driver: bridge
