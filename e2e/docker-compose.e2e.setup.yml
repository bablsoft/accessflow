# AccessFlow End-to-End test stack — setup-wizard variant
#
# Identical service shape to docker-compose.e2e.yml, but:
#   * `ACCESSFLOW_BOOTSTRAP_ENABLED=false` and no `ACCESSFLOW_BOOTSTRAP_ADMIN_*` envs,
#     so the backend boots WITHOUT a pre-seeded admin. The frontend then lands the
#     user on /setup, which is what auth-setup-wizard.spec.ts exercises.
#   * Distinct host ports (5174 / 8081) so this stack can coexist with the main
#     `docker-compose.e2e.yml` (which uses 5173 / 8080) — no need to bring the
#     main stack down before running the setup-variant spec.
#   * Mailcrab is dropped entirely. The setup wizard's SMTP step writes the row
#     to system_smtp_config but does not dial out, so there's no captured email
#     to scrape — Mailcrab would be dead weight.
#   * Top-level `name:` sets the compose project so the two stacks don't share
#     container / network names.
#
# Frontend container runtime config is overridden by bind-mounting
# `./runtime-config.setup.js` over the image's baked-in
# `/usr/share/nginx/html/runtime-config.js`, pointing the browser at
# `http://localhost:8081` (the variant backend) instead of the default 8080.
#
# ⚠️  DEMO ONLY — the JWT private key and encryption key below are the same
#     demo defaults used by the root docker-compose.yml. They are committed
#     deliberately and are NOT safe for any deployment that handles real data.

name: accessflow-e2e-setup

services:
  postgres:
    # pgvector-enabled image: the `vector` extension (deploy/postgres-init/02-pgvector.sql) is
    # required by the RAG knowledge base.
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: accessflow
      POSTGRES_USER: accessflow
      POSTGRES_PASSWORD: accessflow
    volumes:
      - ../deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - e2e-setup-network

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - e2e-setup-network

  backend:
    build:
      # Repo root so backend/Dockerfile can bundle ./connectors into the jar.
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/accessflow
      DB_USER: accessflow
      DB_PASSWORD: accessflow
      AUDIT_DB_USER: accessflow_audit
      AUDIT_DB_PASSWORD: accessflow_audit
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGIN: http://localhost:5174
      ACCESSFLOW_PUBLIC_BASE_URL: http://localhost:5174
      # Demo-only — see warning at the top of this file.
      ENCRYPTION_KEY: 40f05f39ca7296247ac4c12efdf091d8e753e22b96764462473d6e7c9abc550e
