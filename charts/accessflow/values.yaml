# Default values for accessflow.
# This is the source-of-truth values reference; the structure mirrors
# docs/09-deployment.md so the chart and its documentation stay in sync.

# -- Number of replicas for each tier. Honored when `autoscaling.*.enabled` is
# `false`; when an HPA is enabled, `autoscaling.*.minReplicas` takes over.
replicaCount:
  backend: 2
  frontend: 2

image:
  backend:
    repository: ghcr.io/bablsoft/accessflow-backend
    # tag overrides Chart.appVersion when set. Leave empty to use the chart's appVersion.
    tag: ""
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/bablsoft/accessflow-frontend
    tag: ""
    pullPolicy: IfNotPresent

imagePullSecrets: []

# Override generated resource names
nameOverride: ""
fullnameOverride: ""

# Labels merged into every rendered manifest
commonLabels: {}

# Pod-level metadata applied to both backend and frontend
podAnnotations: {}
podLabels: {}

# Scheduling defaults applied to both backend and frontend (override per-tier under
# backend.* / frontend.* if needed)
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Internal PostgreSQL subchart (bitnami/postgresql).
# Set enabled: false to use externalDatabase below instead.
#
# `auth.existingSecret` defaults to a Helm template string that resolves to a
# chart-managed Secret `{release}-accessflow-db` (rendered by templates/db-
# secret.yaml). That Secret carries `helm.sh/resource-policy: keep` so it
# survives `helm uninstall` — keeping its random password in sync with the
# postgresql PVC (which also survives uninstall). Bitnami's own auto-generated
# Secret would NOT survive uninstall, and the mismatch between regenerated
# password and PVC-on-disk password was the root cause of #228's "FATAL:
# password authentication failed for user 'accessflow'" on reinstall.
#
# To bring your own Secret (sealed-secrets, External Secrets, Vault, manual
# `kubectl create secret`), set `auth.existingSecret` to its name. The Secret
# must expose both keys:
#   password          — the AccessFlow custom-user password
#   postgres-password — the postgres admin password
postgresql:
  enabled: true
  auth:
    database: accessflow
    username: accessflow
    existingSecret: '{{ .Release.Name }}-accessflow-db'
  primary:
    persistence:
      enabled: true
      size: 20Gi

# --- Internal Redis subchart (bitnami/redis).
# Set enabled: false to use externalRedis below instead.
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

# --- External database (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  database: accessflow
  username: accessflow
  # Secret must expose the password under the "password" key by default
  # (override via existingSecretPasswordKey).
  existingSecret: ""
  existingSecretPasswordKey: password

# --- Audit-writer database role (issue #67).
#
# AccessFlow uses a dedicated Postgres role to INSERT into audit_log so the general
# DB_USER can have UPDATE/DELETE/TRUNCATE revoked on that table. The role is provisioned
# by `postgresql.primary.initdb.scripts` (see above) when the bundled subchart is in
# use; for external Postgres the operator provisions it manually — see
# docs/09-deployment.md → "audit_log role separation".
audit:
  db:
    # Username of the dedicated audit-writer role. Must match what the initdb script
    # (or your external-Postgres provisioning) created.
    username: accessflow_audit
    # Operator-managed Secret holding the audit-role password. **Required** when
    # postgresql.enabled=false (external Postgres) — the operator provisions the role
    # on their database and provides its password through this Secret. Ignored when
    # postgresql.enabled=true: the chart generates and pins a random password under
    # `{release}-accessflow-audit-db` (kept across uninstall in lock-step with the
    # postgresql PVC, same as the main DB Secret).
    existingSecret: ""
    existingSecretPasswordKey: password

# --- External Redis (used when redis.enabled=false)
externalRedis:
  # Full URL, e.g. "redis://host:6379" or "rediss://user:pass@host:6380".
  url: ""
  # When the URL must come from a Secret, point at one with key REDIS_URL.
  existingSecret: ""
  existingSecretUrlKey: REDIS_URL

# --- Application configuration
config:
  # Application secrets — when `existingSecret` is empty (the default), the chart
  # generates fresh material on first install, stores it in a single chart-managed
  # Secret named "{fullname}-secrets", and preserves the values across upgrades via
  # `helm.sh/resource-policy: keep` + lookup.
  #
  # To bring your own (sealed-secrets, External Secrets, manual `kubectl create
  # secret`, …), set `existingSecret` to the Secret name and `key` to the entry
  # inside that Secret. The chart never deletes or rewrites an externally-managed
  # Secret.
  encryptionKey:
    existingSecret: ""    # auto-generated when empty
    key: value            # ignored when existingSecret is empty
  jwtPrivateKey:
    existingSecret: ""    # auto-generated when empty
    key: value            # ignored when existingSecret is empty
  auditHmac:
    existingSecret: ""    # optional — hex ≥ 32 bytes under key below
    key: value
  # CORS / public-URL config (non-secret)
  corsAllowedOrigin: https://accessflow.company.com
  publicBaseUrl: https://accessflow.company.com
  oauth2FrontendCallbackUrl: ""                    # optional, defaults to ${corsAllowedOrigin}/auth/oauth/callback
  # Frontend runtime config — rendered into a ConfigMap and mounted at
  # /usr/share/nginx/html/runtime-config.js inside the frontend pod.
  frontend:
    apiBaseUrl: https://accessflow.company.com
    wsUrl: wss://accessflow.company.com/ws
    # Extra keys merged into window.__APP_CONFIG__ (object)
    extraConfig: {}

# --- Backend tier
backend:
  service:
    type: ClusterIP
    port: 8080
  # Extra environment variables (relaxed-binding overrides for any
  # ACCESSFLOW_* / SPRING_* knob — see CLAUDE.md → Configuration).
  env: {}
  # extraEnvFrom items appended to the container's envFrom list
  extraEnvFrom: []
  # Override scheduling per-tier (fall back to top-level defaults)
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Health-check tuning
  startupProbe:
    failureThreshold: 60       # ~5 min cold start for Flyway
    periodSeconds: 5
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3

# --- Frontend tier
frontend:
  service:
    type: ClusterIP
    port: 80
  env: {}
  extraEnvFrom: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 30
  readinessProbe:
    initialDelaySeconds: 2
    periodSeconds: 10

# --- Driver cache (JDBC drivers + NoSQL engine plugins downloaded on demand).
# Bound to ACCESSFLOW_DRIVER_CACHE (see CLAUDE.md → Configuration). A volume is
# ALWAYS mounted at `persistence.mountPath`: a PVC when `persistence.enabled`, else
# an ephemeral emptyDir. This is required — the default ~/.accessflow/drivers is not
# writable under runAsUser 1000, which leaves every non-bundled connector UNAVAILABLE.
driverCache:
  persistence:
    # When true, the cache survives pod restarts (drivers downloaded once). When
    # false, an emptyDir is used instead — connectors still work out of the box but
    # re-download on restart. Enable for production to avoid repeated downloads.
    enabled: false
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    mountPath: /var/lib/accessflow/drivers
  # Ephemeral cache tuning, used only when `persistence.enabled` is false.
  emptyDir:
    # Optional sizeLimit for the emptyDir (e.g. "1Gi"). Empty string = no limit.
    sizeLimit: ""

# --- Ingress
#
# TLS is OFF by default — the chart does not assume any particular cert-issuer
# (cert-manager, ACME, manually-managed Secret). To enable HTTPS:
#   1. Set ingress.tls.enabled=true and ingress.tls.secretName to a Secret that
#      holds tls.crt and tls.key.
#   2. Either pre-create that Secret manually, or add a cert-manager annotation
#      under `ingress.annotations` (e.g. cert-manager.io/cluster-issuer:
#      letsencrypt-prod) so cert-manager provisions it on your behalf.
ingress:
  enabled: true
  className: nginx
  # Free-form Ingress annotations. Add cert-manager.io/cluster-issuer,
  # nginx.ingress.kubernetes.io/*, alb.ingress.kubernetes.io/*, etc. here.
  annotations: {}
  # `paths` is optional. When omitted, the chart wires in the standard 3-path
  # routing shown below (`/api` + `/ws` → backend, `/` → frontend), so a
  # minimal override like `hosts: [{ host: my-host }]` Just Works.
  hosts:
    - host: accessflow.company.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /ws
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    enabled: false
    # Secret holding tls.crt and tls.key. Required when enabled=true.
    secretName: accessflow-tls

# --- Resource requests / limits
resources:
  backend:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  frontend:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# --- Horizontal Pod Autoscaler
#
# Off by default so `replicaCount.*` is the single source of truth on first install.
# When `enabled: true`, the HPA owns the replica count and `minReplicas` will
# scale the Deployment up to (at least) that floor regardless of `replicaCount.*`.
autoscaling:
  backend:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  frontend:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# --- Pod disruption budget
#
# Off by default — enabling on a single-replica deployment makes voluntary
# evictions (node drains, cluster upgrades) block forever. Turn on for
# production deployments that run >= 2 replicas.
podDisruptionBudget:
  backend:
    enabled: false
    minAvailable: 1
  frontend:
    enabled: false
    minAvailable: 1

# --- SAML 2.0 SSO (placeholder; wired into the backend Deployment when needed)
saml:
  enabled: false
  spEntityId: ""
  idpMetadataUrl: ""
  keystoreSecret: ""

# --- Startup bootstrap of admin config (env-var driven; GitOps-friendly)
# When enabled, the backend reconciles the resources declared below into the
# database on every startup. See docs/09-deployment.md → "Bootstrap configuration"
# for full semantics. Authoritative mode: declared resources are upserted on
# every restart and overwrite admin-UI edits. Resources NOT declared here are
# left untouched.
#
# Sensitive fields use *SecretRef ({ name, key }) sub-objects that reference a
# pre-existing Kubernetes Secret. The chart does not create Secret objects.
bootstrap:
  enabled: false

  # The tenant org that owns every resource below. Created on first start if a
  # row with this slug does not exist; never deleted.
  organization:
    name: ""                    # required when enabled
    slug: ""                    # optional; derived from name (slugify) when blank

  # First admin user. Created on first start; password is NOT rotated on
  # subsequent restarts (operators rotate via the admin API).
  admin:
    email: ""                   # required when enabled
    displayName: ""             # required when enabled
    passwordSecretRef:          # required when enabled
      name: ""                  # K8s Secret name (must exist)
      key: ""                   # key inside that Secret

  # Review plans (upserted by name). approverEmails resolve at apply time
  # against the admin user above or any already-provisioned users.
  reviewPlans: []
  # - name: standard
  #   description: "Standard review plan"
  #   requiresAiReview: true
  #   requiresHumanApproval: true
  #   minApprovalsRequired: 1
  #   approvalTimeoutHours: 24
  #   autoApproveReads: false
  #   notifyChannelNames: [ops-slack]
  #   approverEmails: [admin@acme.com]

  # AI provider configurations (upserted by name).
  aiConfigs: []
  # - name: claude
  #   provider: ANTHROPIC          # ANTHROPIC | OPENAI | OLLAMA
  #   model: claude-sonnet-4-20250514
  #   endpoint: ""                 # optional override
  #   apiKeySecretRef: { name: accessflow-bootstrap-secrets, key: anthropic-key }
  #   timeoutMs: 30000
  #   maxPromptTokens: 4000
  #   maxCompletionTokens: 1024

  # Datasources (upserted by name). dbType=CUSTOM is rejected — upload CUSTOM
  # driver JARs via the admin API.
  datasources: []
  # - name: prod-postgres
  #   dbType: POSTGRESQL           # POSTGRESQL | MYSQL | MARIADB | ORACLE | MSSQL
  #   host: postgres.prod.svc
  #   port: 5432
  #   databaseName: app
  #   username: af_reader
  #   passwordSecretRef: { name: prod-pg-creds, key: password }
  #   sslMode: REQUIRE             # DISABLE | REQUIRE | VERIFY_CA | VERIFY_FULL
  #   connectionPoolSize: 10
  #   maxRowsPerQuery: 10000
  #   requireReviewReads: false
  #   requireReviewWrites: true
  #   reviewPlanName: standard     # resolved against reviewPlans above
  #   aiAnalysisEnabled: true
  #   aiConfigName: claude         # resolved against aiConfigs above
  #   jdbcUrlOverride: ""

  # Notification channels (upserted by name). `config` carries non-secret
  # sub-fields; sensitive sub-fields are referenced via `sensitiveSecretRefs`
  # keyed by the same sub-field name. The chart merges both into the
  # ACCESSFLOW_BOOTSTRAP_NOTIFICATION_CHANNELS_<N>_CONFIG_<KEY> env-var space.
  notificationChannels: []
  # - name: ops-slack
  #   channelType: SLACK           # EMAIL | SLACK | WEBHOOK
  #   active: true
  #   config:
  #     channel: "#ops"
  #   sensitiveSecretRefs:
  #     webhookUrl: { name: accessflow-bootstrap-secrets, key: slack-webhook }

  # SAML 2.0 (singleton per org). Disabled by default — set saml.enabled=true
  # to render. signingCertPem is in-line; long values can flow through the
  # `backend.extraEnvFrom` mechanism if preferred.
  saml:
    enabled: false
    idpMetadataUrl: ""
    idpEntityId: ""
    spEntityId: ""
    acsUrl: ""
    sloUrl: ""
    signingCertPem: ""
    attrEmail: ""
    attrDisplayName: ""
    attrRole: ""
    defaultRole: REVIEWER         # ADMIN | REVIEWER | ANALYST | READONLY
    active: true

  # OAuth2 / OIDC providers (upserted by provider key — GOOGLE / GITHUB / etc.).
  oauth2: []
  # - provider: GOOGLE
  #   clientId: "..."
  #   clientSecretRef: { name: accessflow-bootstrap-secrets, key: google-client-secret }
  #   scopesOverride: ""
  #   tenantId: ""
  #   defaultRole: REVIEWER
  #   active: true
  # - provider: GITHUB_ENTERPRISE
  #   clientId: "..."
  #   clientSecretRef: { name: accessflow-bootstrap-secrets, key: ghes-client-secret }
  #   baseUrl: "https://github.acme.corp"   # required for *_ENTERPRISE — must be https origin
  #   scopesOverride: "read:user user:email read:org"
  #   defaultRole: ANALYST
  #   active: true
  # - provider: GITLAB_ENTERPRISE
  #   clientId: "..."
  #   clientSecretRef: { name: accessflow-bootstrap-secrets, key: gle-client-secret }
  #   baseUrl: "https://gitlab.acme.corp"
  #   defaultRole: ANALYST
  #   active: true

  # Langfuse integration (singleton per org). Drives LLM-call tracing and
  # prompt management. host blank ⇒ ACCESSFLOW_LANGFUSE_DEFAULT_HOST.
  langfuse:
    enabled: false
    host: ""
    publicKey: ""
    secretKeyRef: { name: "", key: "" }   # required when enabled
    tracingEnabled: true
    promptManagementEnabled: false

  # System SMTP relay (singleton per org). Used for outbound email — review
  # notifications, password resets, invitations.
  systemSmtp:
    enabled: false
    host: ""
    port: 587
    username: ""
    passwordSecretRef: { name: "", key: "" }
    tls: true
    fromAddress: ""
    fromName: AccessFlow
