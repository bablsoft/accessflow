{{- /*
Chart-managed Secret with auto-generated Postgres passwords. Bitnami's own
Secret doesn't carry `helm.sh/resource-policy: keep`, so `helm uninstall`
deletes it — but the postgresql PVC always survives uninstall. On the next
`helm install`, bitnami generates a fresh random password while the data dir
still has the old one, producing "FATAL: password authentication failed for
user 'accessflow'" (issue #228).

We sidestep that by owning the Secret ourselves, annotating it with
`helm.sh/resource-policy: keep` so it survives uninstall in lock-step with
the PVC, and pointing bitnami at it via `postgresql.auth.existingSecret`
(which the bitnami chart runs through `tpl` — see _helpers.tpl).

When the operator brings their own Secret (`postgresql.auth.existingSecret`
overridden in values), `accessflow.db.chartManaged` returns empty and this
template is skipped.

On the first upgrade from the pre-AF-228 layout, `accessflow.db.lookupOrDefault`
falls back to the legacy `{release}-postgresql` Secret so the data dir
continues to authenticate.
*/ -}}
{{- if eq (include "accessflow.db.chartManaged" .) "true" -}}
{{- $secretName := include "accessflow.db.secrets.fullname" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "accessflow.labels" . | nindent 4 }}
  annotations:
    # Keep the Secret on uninstall so its random passwords stay in sync with
    # the postgresql PVC (which also survives uninstall). Losing this Secret
    # without also deleting the PVC produces "password authentication failed".
    "helm.sh/resource-policy": keep
type: Opaque
data:
  password: {{ include "accessflow.db.lookupOrDefault" (dict "ctx" . "key" "password" "default" (randAlphaNum 24)) | b64enc | quote }}
  postgres-password: {{ include "accessflow.db.lookupOrDefault" (dict "ctx" . "key" "postgres-password" "default" (randAlphaNum 24)) | b64enc | quote }}
{{- end -}}
