{{- /*
Chart-managed Secret with the password for the dedicated `accessflow_audit` Postgres
role (issue #67). Same persistence model as the main Postgres Secret in
templates/db-secret.yaml: `helm.sh/resource-policy: keep` so the value survives
`helm uninstall` in lock-step with the postgresql PVC, and a `lookup` to preserve the
existing password across upgrades.

Operators who manage the password externally point `audit.db.existingSecret` at their
own Secret (must expose the password under the configured key) and this manifest is
skipped.
*/ -}}
{{- if eq (include "accessflow.auditDb.chartManaged" .) "true" -}}
{{- $secretName := include "accessflow.auditDb.secrets.fullname" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "accessflow.labels" . | nindent 4 }}
  annotations:
    # Keep the Secret on uninstall — the postgresql PVC also survives uninstall, and a
    # regenerated audit-role password without a matching pg_authid row produces "FATAL:
    # password authentication failed for user 'accessflow_audit'" on reinstall.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  password: {{ include "accessflow.auditDb.lookupOrDefault" (dict "ctx" . "key" "password" "default" (randAlphaNum 24)) | b64enc | quote }}
{{- end -}}
