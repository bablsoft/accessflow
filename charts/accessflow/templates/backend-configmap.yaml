apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accessflow.backend.fullname" . }}-env
  labels:
    {{- include "accessflow.backend.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.backend.service.port | quote }}
  DB_URL: {{ include "accessflow.db.url" . | quote }}
  DB_USER: {{ include "accessflow.db.username" . | quote }}
  AUDIT_DB_USER: {{ include "accessflow.auditDb.username" . | quote }}
  REDIS_URL: {{ include "accessflow.redis.url" . | quote }}
  CORS_ALLOWED_ORIGIN: {{ .Values.config.corsAllowedOrigin | quote }}
  ACCESSFLOW_PUBLIC_BASE_URL: {{ .Values.config.publicBaseUrl | quote }}
  ACCESSFLOW_OAUTH2_FRONTEND_CALLBACK_URL: {{ include "accessflow.oauth2.callbackUrl" . | quote }}
  # Always point the driver cache at the mounted volume — a PVC when persistence is
  # enabled, otherwise an ephemeral emptyDir (see backend-deployment.yaml). The default
  # home (~/.accessflow/drivers) is not writable under runAsUser 1000, which would leave
  # every on-demand connector UNAVAILABLE.
  ACCESSFLOW_DRIVER_CACHE: {{ .Values.driverCache.persistence.mountPath | quote }}
  {{- if and .Values.observability.tracing.otlp.enabled .Values.observability.tracing.otlp.endpoint }}
  # OTLP trace export (AF-454) — the backend bridges this onto the Spring exporter.
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.tracing.otlp.endpoint | quote }}
  {{- with .Values.observability.tracing.otlp.headers }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.observability.tracing.samplingProbability }}
  ACCESSFLOW_TRACING_SAMPLING_PROBABILITY: {{ . | quote }}
  {{- end }}
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- include "accessflow.bootstrap.configmap" . | nindent 2 }}
