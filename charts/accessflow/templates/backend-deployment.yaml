apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "accessflow.backend.fullname" . }}
  labels:
    {{- include "accessflow.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.backend.enabled }}
  replicas: {{ .Values.replicaCount.backend }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "accessflow.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "accessflow.backend.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "accessflow.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- if .Values.postgresql.enabled }}
      # initContainer provisions the dedicated `accessflow_audit` Postgres role
      # (issue #67) before the backend's Flyway boot runs V38, which transfers
      # ownership of audit_log to that role. We run this as a backend initContainer
      # rather than a bitnami `primary.initdb.scripts` entry because the bitnami
      # init flow runs scripts under a md5-auth pg_hba.conf with quirky
      # POSTGRES_DB vs POSTGRES_DATABASE env-var naming — the previous attempt
      # crash-looped both ways (#228). Connecting as the postgres admin via the
      # service from a separate pod side-steps both issues. The SQL is idempotent
      # so re-runs (rolling updates, pod restarts) are harmless.
      initContainers:
        - name: audit-role-provisioner
          # upstream postgres:18-alpine — ships psql + pg_isready, ~80 MB. The
          # bitnami chart's own image tag ships as `latest` which we don't want
          # to depend on for reproducibility.
          image: docker.io/library/postgres:18-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
          env:
            - name: PGHOST
              value: {{ printf "%s-postgresql" .Release.Name | quote }}
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "accessflow.db.passwordSecret" . }}
                  key: postgres-password
            - name: AUDIT_DB_USER
              value: {{ include "accessflow.auditDb.username" . | quote }}
            - name: AUDIT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "accessflow.auditDb.passwordSecret" . }}
                  key: {{ include "accessflow.auditDb.passwordSecretKey" . }}
            - name: APP_DB_USER
              value: {{ .Values.postgresql.auth.username | quote }}
          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              # Wait until postgres accepts TCP connections + auth. Hikari on the
              # backend container will retry too, but failing here is more visible.
              for attempt in $(seq 1 60); do
                if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                  break
                fi
                echo "waiting for postgres (attempt $attempt/60)..."
                sleep 2
              done
              psql -v ON_ERROR_STOP=1 -w <<-EOSQL
                DO \$do\$
                BEGIN
                    IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '${AUDIT_DB_USER}') THEN
                        EXECUTE format('CREATE ROLE %I LOGIN PASSWORD %L', '${AUDIT_DB_USER}', '${AUDIT_DB_PASSWORD}');
                    ELSE
                        EXECUTE format('ALTER ROLE %I WITH LOGIN PASSWORD %L', '${AUDIT_DB_USER}', '${AUDIT_DB_PASSWORD}');
                    END IF;
                END \$do\$;
                GRANT CONNECT ON DATABASE "${PGDATABASE}" TO "${AUDIT_DB_USER}";
                -- ALTER TABLE audit_log OWNER TO accessflow_audit (in V38) requires the
                -- new owner to have CREATE on the table's schema — USAGE alone is not
                -- enough, even when the role doing the alter is the schema owner.
                GRANT USAGE, CREATE ON SCHEMA public TO "${AUDIT_DB_USER}";
                -- Membership lets the app role ALTER TABLE OWNER in V38 without superuser privs.
                GRANT "${AUDIT_DB_USER}" TO "${APP_DB_USER}";
              EOSQL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ include "accessflow.image.tag" (dict "tier" .Values.image.backend "ctx" $) }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "accessflow.backend.fullname" . }}-env
            {{- with .Values.backend.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "accessflow.db.passwordSecret" . }}
                  key: {{ include "accessflow.db.passwordSecretKey" . }}
            # Dedicated audit-writer DB role (issue #67). Used by the audit module's
            # auditDataSource bean to INSERT into audit_log; the general DB_USER has
            # UPDATE/DELETE/TRUNCATE on audit_log revoked by V38.
            - name: AUDIT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "accessflow.auditDb.passwordSecret" . }}
                  key: {{ include "accessflow.auditDb.passwordSecretKey" . }}
            {{- if and (not .Values.redis.enabled) .Values.externalRedis.existingSecret }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalRedis.existingSecret }}
                  key: {{ default "REDIS_URL" .Values.externalRedis.existingSecretUrlKey }}
            {{- end }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "accessflow.encryptionKey.secretName" . }}
                  key: {{ include "accessflow.encryptionKey.secretKey" . }}
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "accessflow.jwtPrivateKey.secretName" . }}
                  key: {{ include "accessflow.jwtPrivateKey.secretKey" . }}
            {{- if .Values.config.auditHmac.existingSecret }}
            - name: AUDIT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.auditHmac.existingSecret }}
                  key: {{ default "value" .Values.config.auditHmac.key }}
            {{- end }}
            {{- include "accessflow.bootstrap.envSecrets" . | nindent 12 }}
          {{- if .Values.driverCache.persistence.enabled }}
          volumeMounts:
            - name: driver-cache
              mountPath: {{ .Values.driverCache.persistence.mountPath }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: {{ .Values.backend.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.backend.startupProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.backend.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.backend.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
      {{- if .Values.driverCache.persistence.enabled }}
      volumes:
        - name: driver-cache
          persistentVolumeClaim:
            claimName: {{ include "accessflow.backend.fullname" . }}-driver-cache
      {{- end }}
      {{- with (default .Values.nodeSelector .Values.backend.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.tolerations .Values.backend.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.affinity .Values.backend.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
