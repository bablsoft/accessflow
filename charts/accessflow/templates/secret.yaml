{{- /*
Chart-managed Secret with auto-generated material for the encryption key and
JWT signing key — rendered only when the operator did not supply their own
`config.{encryptionKey,jwtPrivateKey}.existingSecret`. Values already present
on the cluster are preserved across upgrades via `lookup`, so existing
deployments keep their keys.

Operators who manage secrets externally (sealed-secrets, External Secrets,
Vault, manual `kubectl create secret`) point `existingSecret` at their own
Secret and this manifest is not rendered.
*/ -}}
{{- if include "accessflow.secrets.chartManaged" . -}}
{{- $secretName := include "accessflow.secrets.fullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := dict -}}
{{- if and $existing $existing.data -}}
{{- $existingData = $existing.data -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "accessflow.labels" . | nindent 4 }}
  annotations:
    # Tell Helm to keep the Secret on uninstall — losing the encryption key
    # would render every encrypted datasource credential unrecoverable.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if not .Values.config.encryptionKey.existingSecret }}
  {{- $encExisting := index $existingData "ENCRYPTION_KEY" }}
  {{- if $encExisting }}
  ENCRYPTION_KEY: {{ $encExisting }}
  {{- else }}
  {{- /* Backend expects 64 hex chars (32 bytes). sha256sum yields exactly that. */}}
  ENCRYPTION_KEY: {{ randAlphaNum 32 | sha256sum | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if not .Values.config.jwtPrivateKey.existingSecret }}
  {{- $jwtExisting := index $existingData "JWT_PRIVATE_KEY" }}
  {{- if $jwtExisting }}
  JWT_PRIVATE_KEY: {{ $jwtExisting }}
  {{- else }}
  {{- $rsa := genPrivateKey "rsa" }}
  JWT_PRIVATE_KEY: {{ $rsa | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
