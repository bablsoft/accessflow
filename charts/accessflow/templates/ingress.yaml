{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "accessflow.fullname" . }}
  labels:
    {{- include "accessflow.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ required "ingress.tls.secretName is required when ingress.tls.enabled=true" .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- /*
    Default routing applied to any host that omits `paths`. Keeps short-form
    overrides (`hosts: [{ host: my-host }]`) working — Helm replaces the
    default list element wholesale, so without this fallback the rendered
    Ingress fails validation with "spec.rules[].http.paths: Required value".
    */}}
    {{- /*
    The trailing slash on /api/ is deliberate: Traefik and ingress-nginx match
    `Prefix` paths as literal string prefixes, so a bare /api would swallow SPA
    routes like /api-requests and /api-editor instead of letting them fall
    through to the frontend.
    */}}
    {{- $defaultPaths := list
        (dict "path" "/api/" "pathType" "Prefix" "service" "backend")
        (dict "path" "/ws"  "pathType" "Prefix" "service" "backend")
        (dict "path" "/"    "pathType" "Prefix" "service" "frontend") }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range (default $defaultPaths .paths) }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "backend" }}
                name: {{ include "accessflow.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
                {{- else if eq .service "frontend" }}
                name: {{ include "accessflow.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
                {{- else }}
                {{- fail (printf "ingress.hosts[].paths[].service must be \"backend\" or \"frontend\", got %q" .service) }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
