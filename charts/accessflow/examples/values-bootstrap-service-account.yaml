# Bootstrap a CI / IaC service account and its API key (AF-452).
#
# A service account is an API-key-only user (no password login) used by the
# AccessFlow Terraform/OpenTofu provider or the reusable GitHub/GitLab Actions
# to provision datasources, review plans, and policies declaratively. The raw
# key is supplied from a Secret — only its SHA-256 hash is persisted — so a
# pipeline holds credentials with no interactive login. role defaults to ADMIN
# (declarative CRUD needs admin); the key is rotated in place when it changes.
#
# Pre-create this Secret in the release namespace (the value is the af_-prefixed
# token your pipeline / Terraform will send as `Authorization: ApiKey <token>`):
#   kubectl create secret generic accessflow-bootstrap-secrets \
#     --from-literal=admin-password="$(openssl rand -base64 24)" \
#     --from-literal=ci-api-key="af_$(openssl rand -base64 32 | tr '+/' '-_' | tr -d '=')"
#
# Layer on top of a deployment-shape example:
#   helm install accessflow accessflow/accessflow \
#     --namespace accessflow --create-namespace \
#     -f charts/accessflow/examples/values-production.yaml \
#     -f charts/accessflow/examples/values-bootstrap-service-account.yaml

bootstrap:
  enabled: true

  organization:
    name: Acme Corp

  admin:
    email: admin@acme.example.com
    displayName: Acme Admin
    passwordSecretRef:
      name: accessflow-bootstrap-secrets
      key: admin-password

  serviceAccounts:
    - email: terraform@acme.example.com
      displayName: Terraform CI
      role: ADMIN
      apiKeyName: terraform
      apiKeySecretRef:
        name: accessflow-bootstrap-secrets
        key: ci-api-key
      # Optional ISO-8601 instant; never expires when omitted.
      # apiKeyExpiresAt: "2027-01-01T00:00:00Z"
